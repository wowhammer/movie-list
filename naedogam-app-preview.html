body.home-dark{ background:radial-gradient(circle at 50% -10%, rgba(102,78,57,.16), transparent 560px), linear-gradient(180deg,#1b1916,#0d0d0c 100%) !important; }

.ndhome{ color:#f6eddf; font-family:Pretendard,"Apple SD Gothic Neo","Noto Sans KR",system-ui,-apple-system,sans-serif;
  width:min(100%,520px); margin:0 auto; padding:14px 12px calc(116px + env(safe-area-inset-bottom)); -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
.ndhome .emj{ font-size:20px; }

.ndh-tabs{ display:flex; gap:2px; overflow-x:auto; -webkit-overflow-scrolling:touch; touch-action:pan-x; padding:7px; margin-bottom:16px; border:1px solid rgba(238,224,205,.13); border-radius:22px; background:linear-gradient(180deg,rgba(255,255,255,.026),rgba(255,255,255,.008)),rgba(35,31,27,.92); box-shadow:0 12px 30px rgba(0,0,0,.13); scrollbar-width:none; }

<script>
/* =====================================================================
 *  내도감 엔진 골조 v1
 *  구조: [MANIFESTS 설정] → [DataSource 추상화] → [Engine 렌더]
 *  - 데모(Mock)로 즉시 구동. Client ID 입력 시 GoogleSheet로 무중단 교체.
 *  - 화면/엔진은 데이터 출처를 모른다(영속성·배포·테스트를 동시에 해결).
 *  실행: 브라우저로 열면 데모로 동작. 구글 연결은 http 서버(localhost)에서만 가능.
 * ===================================================================== */

/* ── 0. 안전 저장소: 배포본은 localStorage, 미리보기/샌드박스는 메모리로 자동 폴백 ── */
const store = (() => {
  const NS = (typeof CONFIG!=="undefined" && CONFIG.DEPLOY) ? "app:" : "";   // 배포앱은 개인앱과 로컬저장소 분리
  try { const k="__nd"; localStorage.setItem(k,"1"); localStorage.removeItem(k);
    return { getItem:k=>localStorage.getItem(NS+k), setItem:(k,v)=>localStorage.setItem(NS+k,String(v)), removeItem:k=>localStorage.removeItem(NS+k) }; }
  catch(e){ const m={}; return { getItem:k=>k in m?m[k]:null, setItem:(k,v)=>{m[k]=String(v);}, removeItem:k=>{delete m[k];} }; }
})();

/* =====================================================================
 *  ROADMAP (박아둠) — STEP 2: 배포용 '각자 구글 로그인' (나중에 배포할 때 구현)
 *  - 목표: 각 사용자가 자기 구글로 로그인 → 본인 드라이브에 '내도감 Data' 시트 자동 생성
 *          → 모든 수정이 그 시트에 저장(앱 지워도 데이터는 각자 드라이브에 남음).
 *  - 코드: GoogleSheetDataSource(type:"mysheet", drive.file) 골조 있음 → sourceFor에 연결 필요.
 *  - 준비물: 구글 클라우드 OAuth 클라이언트 ID 1개(+Sheets·Drive API), '구글로 로그인' 버튼.
 *  - 지금(Step1): 7개 카테고리 nd 규격 통일 완료. 탭명 한글·_id 첫열로 정리 중(앱은 옛/새 이름 자동수용).
 * ===================================================================== */
/* ── 1. MANIFESTS: 도메인 정의(여기만 늘리면 도메인이 는다) ── */
const MANIFESTS = {
  mbti:{ id:"mbti", title:"MBTI", icon:"🧠", vol:"", canAdd:false,
    source:{ type:"sheet", tab:"성격유형" },
    fields:[ {k:"date",sheet:"측정일",label:"측정일",type:"date"},
             {k:"type",sheet:"유형",label:"유형",type:"text"},
             {k:"nick",sheet:"별칭",label:"별칭",type:"text"},
             {k:"axes",sheet:"축상세",label:"축상세",type:"text",hideForm:true} ],
    search:["type","nick"], dateSort:"date",
    stats:[ {label:"측정",type:"count",c:"#7c3aed"} ] },
  period:{ id:"period", title:"생리주기", icon:"🌙", vol:"", canAdd:false, source:{ type:"sheet", tab:"생리주기" },
    fields:[ {k:"start",sheet:"시작일",label:"시작일",type:"date"},{k:"end",sheet:"종료일",label:"종료일",type:"date"},{k:"flow",sheet:"양",label:"양",type:"text"},{k:"symptoms",sheet:"증상",label:"증상",type:"text"},{k:"mood",sheet:"기분",label:"기분",type:"text"},{k:"note",sheet:"메모",label:"메모",type:"text"} ],
    search:["flow","mood","note"], dateSort:"start",

  movies:{ id:"movies", title:"영화", icon:"🎬", vol:"卷1", canAdd:true, shareFields:["title","director","year","country"],

      clean(o){

        if(!o.orig) return null;

        o.watchDate=String(o["본날"]==null?"":o["본날"]);
        o.directSearch=String(o["직접검색"]==null?"":o["직접검색"]);
        o.streaming=(typeof o.streaming==="string")?o.streaming.split(/[,\/|]+/).map(x=>x.trim()).filter(Boolean):(Array.isArray(o.streaming)?o.streaming:[]);
        o.recommendList=String(o.recommend==null?"":o.recommend).split(/[\/,]+/).map(x=>x.trim()).filter(Boolean);

/* ── 2. DataSource 추상화 ──
   계약: ensureReady(), list(domainId)→rows[], upsert(domainId,row), label, isLive */
class MockDataSource {
  constructor(){ this.isLive=false; this.label="데모 데이터"; this._d=SAMPLE; }
  async ensureReady(){ return true; }
  async list(id){ return (this._d[id]||[]).slice(); }
  async upsert(id,row){ const a=this._d[id]||(this._d[id]=[]); const i=a.findIndex(x=>x._id===row._id);
    i>=0?a[i]=row:a.push({...row,_id:row._id||crypto.randomUUID()}); return true; }
}
/* 구글 시트 소스: drive.file 스코프로 앱 전용 시트에 read/write. Client ID 필요. */
/* 내 구글시트: 로그인 후 내 드라이브에 '내도감 Data'를 만들고 읽고/쓴다.
   ★ 안전 규칙: 탭이 '없을 때만' 만든다. 있으면 절대 손대지 않는다. 지우거나 덮어쓰는 기능은 아예 없다. */
class GoogleSheetDataSource {
  constructor(clientId){ this.clientId=clientId; this.isLive=true; this.label="내 구글시트"; this.token=null; this.ssId=store.getItem("nd.ssId"); }
  async ensureReady(){ await this._auth(); await this._ensureSpreadsheet(); await this._ensureTabs(); return true; }
  _auth(){ return new Promise((res,rej)=>{
    if(!window.google?.accounts?.oauth2) return rej(new Error("구글 로그인 스크립트 미로드(인터넷 확인)"));
    const tc = google.accounts.oauth2.initTokenClient({
      client_id:this.clientId, scope:"https://www.googleapis.com/auth/drive.file",
      callback:r=>{ if(r.error) return rej(new Error("로그인 실패: "+r.error)); this.token=r.access_token; res(); } });
    tc.requestAccessToken();
  }); }
  async _api(url,opt={}){
    const res=await fetch(url,{...opt,headers:{Authorization:"Bearer "+this.token,"Content-Type":"application/json",...(opt.headers||{})}});
    const t=await res.text(); let b; try{b=JSON.parse(t);}catch{b=t;}
    if(!res.ok){ let h=res.status===403?" (구글 클라우드에서 Sheets·Drive 사용설정 확인)":res.status===401?" (다시 연결 필요)":"";
      const msg=(b&&b.error&&b.error.message) ? b.error.message : (typeof b==="string"?b.slice(0,200):JSON.stringify(b).slice(0,200));
      throw new Error(`HTTP ${res.status}${h} — ${msg}`); }
    return b;
  }
  _cell(v){ return Array.isArray(v)?v.join("|") : v===true?"TRUE" : v===false?"FALSE" : (v==null?"":String(v)); }
  _range(sheet, a1){ return encodeURIComponent(`'${sheet}'!${a1}`); }   // 한글 탭 이름은 따옴표로 감싼다
  async _ensureSpreadsheet(){   // 파일이 없을 때만, 저장용 탭(도서·명산·러닝)만 딱 만든다(빈 기본시트 안 생기게)
    if(this.ssId) return;
    const tabs=Object.values(MANIFESTS).filter(m=>m.source?.type==="mysheet").map(m=>({properties:{title:m.source.sheet}}));
    const d=await this._api("https://sheets.googleapis.com/v4/spreadsheets",{method:"POST",
      body:JSON.stringify({properties:{title:"내도감 Data"}, sheets:tabs})});
    this.ssId=d.spreadsheetId; store.setItem("nd.ssId",this.ssId);
  }
  async _tabTitles(){
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}?fields=sheets.properties.title`);
    return (d.sheets||[]).map(s=>s.properties.title);
  }
  async _isEmpty(sheet){   // 탭이 비어 있는지(헤더도 없는지) 확인
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(sheet,"A1")}`);
    return !(d.values && d.values.length);
  }
  async _ensureTabs(){   // 없는 탭만 만들고, '비어 있을 때만' 헤더·샘플을 채운다. 기존 데이터는 절대 안 덮음.
    const have=await this._tabTitles();
    this.warnings=[];
    for(const m of Object.values(MANIFESTS)){
      if(m.source?.type!=="mysheet") continue;
      const tab=m.source.sheet;                                      // ★ 탭 이름은 설정(source) 안에 있다
      try{
        if(!have.includes(tab)){                                     // 없으면 탭 생성
          await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}:batchUpdate`,{method:"POST",
            body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
        }
        if(await this._isEmpty(tab)){                                // ★ 비어 있을 때만 채움(부분실패 복구 포함)
          const keys=["_id",...fieldKeys(m)];
          const seed=(SAMPLE[m.id]||[]).map(r=>keys.map(k=>this._cell(r[k])));
          await this._write(tab, [keys, ...seed]);
        }
      }catch(e){ this.warnings.push(`${m.title}: ${e.message}`); }   // 한 탭이 실패해도 연결은 계속
    }
  }
  async _write(sheet,values){
    return this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(sheet,"A1")}?valueInputOption=RAW`,
      {method:"PUT",body:JSON.stringify({values})});
  }
  async list(id){
    const m=MANIFESTS[id];
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(m.source.sheet,"A1:Z10000")}`);
    const vals=d.values||[]; if(vals.length<2) return [];
    const [head,...rows]=vals;
    return rows.map(r=>Object.fromEntries(head.map((k,i)=>[k, coerce(r[i])])));
  }
  async upsert(id,row){   // 맨 아래에 한 줄만 추가(append). 기존 줄은 절대 안 건드림.
    const m=MANIFESTS[id]; const keys=["_id",...fieldKeys(m)];
    const line=keys.map(k=>this._cell(row[k]));
    return this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(m.source.sheet,"A1")}:append?valueInputOption=RAW`,
      {method:"POST",body:JSON.stringify({values:[line]})});
  }
}
/* Apps Script 통로: 기존 백엔드(doGet)를 그대로 재사용. 이번 단계는 읽기(list) 전용. */
function reCell(s){ // 네이버 링크 수식이 껴 있으면 글자만 뽑고, 아니면 그대로 정리
  return String(s==null?'':s).replace(/=HYPERLINK\("[^"]*",\s*"([^"]+)"\)/,'$1').trim();
}
function mapRow(m, row){ // 시트 한 줄(한글 헤더) → 엔진 항목
  const out = {};
  const map = m.source?.map || {};
  for(const [key, header] of Object.entries(map)) out[key] = reCell(row[header]);
  if(typeof m.source?.derive === "function") m.source.derive(out, row, reCell);
  if(!out._id) out._id = crypto.randomUUID();
  return out;
}
class AppsScriptDataSource {
  constructor(url){ this.url=url; this.isLive=true; this.label="구글시트"; }
  async ensureReady(){ if(!this.url) throw new Error("APPS_SCRIPT_URL이 비어 있습니다"); return true; }
  async list(id){
    const m=MANIFESTS[id];
    const q=m.source?.sheet ? ("?sheet="+encodeURIComponent(m.source.sheet)) : "";
    const res=await fetch(this.url+q);
    if(!res.ok) throw new Error("HTTP "+res.status+" (Apps Script 배포/권한 확인)");
    const raw=await res.json();
    return (Array.isArray(raw)?raw:[]).map(row=>mapRow(m,row));
  }
  async post(payload){   // 기존 영화·차계부 백엔드 액션 호출(예: 시청여부 업데이트)
    const res=await fetch(this.url,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
    const t=await res.text(); let j; try{ j=JSON.parse(t); }catch(e){ j={}; }
    if(j && j.ok===false) throw new Error(j.error||"실패");
    if(j && j.error) throw new Error(j.error);
    return j;
  }
  async upsert(){ throw new Error("이 단계는 보기 전용입니다(추가·수정은 다음 단계)"); }
}

/* SheetDataSource: 기존 시트에 '탭'을 만들고 읽고 쓰는 통로 (방금 뚫은 nd 문 사용).
   도서·명산·러닝처럼 우리가 관리하는 탭에 씀. 영화·차계부는 위 AppsScriptDataSource(기존 방식) 유지. */
function sheetCell(v){ return Array.isArray(v)?v.join("|") : v===true?"TRUE" : v===false?"FALSE" : (v==null?"":String(v)); }
class SheetDataSource {
  constructor(url){ this.url=url; this.isLive=true; this.label="구글시트"; this._ensured=new Set(); this._tab={}; this._idkey={}; }
  async ensureReady(){ if(!this.url) throw new Error("APPS_SCRIPT_URL이 비어 있습니다"); return true; }
  _flatten(m, r){ const o={_id:sheetCell(r._id)}; (m.fields||[]).forEach(f=>{ o[f.sheet||f.k]=sheetCell(r[f.k]); }); return o; }
  async _post(payload){   // 탭 만들기·한 줄 추가 같은 '쓰기'. text/plain로 보내야 브라우저가 안 막음.
    const res=await fetch(this.url,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(Object.assign({nd:1},payload))});
    const t=await res.text(); let j; try{ j=JSON.parse(t); }catch(e){ j={}; }
    if(j && j.error) throw new Error(j.error);
    return j;
  }
  async ensure(m){        // 탭이 없으면 만들고(+샘플), 있으면 그대로. 한 세션에 한 번만.
    if(m.source && m.source.skipEnsure) return;   // 이미 있는 기존 탭(차계부 등)은 건드리지 않음
    if(this._ensured.has(m.id)) return;
    const header=ndHeaders(m);
    await this._post({action:"ensureTab", tab:m.source.tab, header, rows:[]});   // 샘플 안 심음: 실데이터만(한글 헤더)
    this._ensured.add(m.id);
  }
  async list(id){
    const m=MANIFESTS[id];
    await this.ensure(m);
    // 탭 이름 자동 감지: 새 이름(예: 영화/차계부)과 옛 이름(MOVIE/CARLOG) 둘 다 수용
    const cands = this._tab[id]
      ? [this._tab[id], m.source.tab, m.source.tabAlt].filter((v,i,a)=>v&&a.indexOf(v)===i)
      : [m.source.tab, m.source.tabAlt].filter(Boolean);
    let raw=[], used=cands[0]||m.source.tab, got=false;
    for(const t of cands){
      const res=await fetch(this.url+"?nd=1&action=read&tab="+encodeURIComponent(t));
      if(!res.ok) continue;
      const j=await res.json();
      if(j && j.error) throw new Error(j.error);
      const arr=Array.isArray(j)?j:[];
      if(arr.length){ raw=arr; used=t; got=true; break; }
      if(!got){ raw=arr; used=t; }
    }
    this._tab[id]=used;
    const hdr = raw[0] ? Object.keys(raw[0]) : [];
    this._idkey[id] = hdr.includes("_id") ? "_id" : ((m.source.idCol && hdr.includes(m.source.idCol)) ? m.source.idCol : "_id");
    const inv=ndInv(m); const clean=m.source&&m.source.clean;
    return raw.map(row=>{ const o={}; for(const kh in row){ const ek=inv[ndNorm(kh)]||kh; const val=coerce(row[kh]);
      if(o[ek]===undefined || o[ek]===null || o[ek]==="") o[ek]=val;   // 중복 열: 첫 비어있지않은 값 우선
    } var _oo=clean?clean(o):o; return _oo; }).filter(Boolean);
  }
  async readTab(tab){ const res=await fetch(this.url+"?nd=1&action=read&tab="+encodeURIComponent(tab)); if(!res.ok) return []; let j; try{ j=await res.json(); }catch(e){ return []; } if(j&&j.error) return []; return Array.isArray(j)?j:[]; }
  tabOf(id){ return this._tab[id] || (MANIFESTS[id] && MANIFESTS[id].source.tab); }
  idkeyOf(id){ return this._idkey[id] || (MANIFESTS[id] && MANIFESTS[id].source.idCol) || "_id"; }
  async upsert(id,row){   // 탭 맨 아래에 한 줄 추가(저장)
    const m=MANIFESTS[id];
    return this._post({action:"append", tab:m.source.tab, header:ndHeaders(m), row:this._flatten(m,row)});
  }
  async update(id,rowId,row){   // _id로 찾아 수정
    const m=MANIFESTS[id];
    return this._post({action:"update", tab:m.source.tab, id:rowId, row:this._flatten(m,row)});
  }
  async remove(id,rowId){       // _id로 찾아 삭제
    const m=MANIFESTS[id];
    return this._post({action:"delete", tab:m.source.tab, id:rowId});
  }
  // 임의 탭 대상(차계부처럼 한글 헤더·ID 기준). 헤더 순서는 백엔드가 실제 시트에서 맞춤.
  async appendRaw(tab,row){ return this._post({action:"append", tab, header:Object.keys(row), row}); }
  async updateRaw(tab,id,row,idKey){ return this._post({action:"update", tab, id, row, idKey}); }
  async deleteRaw(tab,id,idKey){ return this._post({action:"delete", tab, id, idKey}); }
}
const fieldKeys = m => (SAMPLE[m.id]?.[0] ? Object.keys(SAMPLE[m.id][0]).filter(k=>k!=="_id") : m.search);
function ndHeaders(m){ return ["_id", ...((m.fields||[]).map(f=>f.sheet||f.k))]; }   // 시트에 쓸 한글 헤더
function ndNorm(x){ return String(x==null?"":x).replace(/\s+/g,"").trim(); }
function ndInv(m){ const inv={}; inv[ndNorm("_id")]="_id"; if(m.source&&m.source.idCol) inv[ndNorm(m.source.idCol)]="_id";   // 기존 탭이 'ID' 등 다른 식별자 열을 쓰면 _id로 매핑
  (m.fields||[]).forEach(f=>{ inv[ndNorm(f.k)]=f.k; if(f.sheet) inv[ndNorm(f.sheet)]=f.k; }); return inv; }  // 헤더(공백 무시)→엔진키
const coerce = v => v==="TRUE"?true : v==="FALSE"?false : (v!=="" && !isNaN(v) && v!==null)? +v : (typeof v==="string"&&v.includes("|")?v.split("|"):v);

/* ── 3. Engine: computed·통계·검색·렌더(데이터 출처 무관) ── */
const CALCS = { // 확장점: 새 계산식은 여기 등록
  deltaOdoPerLiter(rows, field){ let prev=null; return rows.map(r=>{ let v=null;
    if(r.type==="주유"&&r.liters){ if(prev!=null) v=+((r.odo-prev)/r.liters).toFixed(1); prev=r.odo; }
    return {...r,[field]:v}; }); },
  pacePerKm(rows, field){ return rows.map(r=>({ ...r, [field]: (r.dist? +(r.time/r.dist).toFixed(1): null) })); },
  subMonthly(rows, field){ return rows.map(r=>{ const c=+r.cost||0; return {...r,[field]: r.cycle==="연"?Math.round(c/12):c }; }); },   // 연구독은 12로 나눠 월 환산
  subYearly(rows, field){ return rows.map(r=>{ const c=+r.cost||0; return {...r,[field]: r.cycle==="연"?c:c*12 }; }); }              // 월구독은 12배 연 환산
};
function applyComputed(m, rows){
  if(!m.computed) return rows;
  let out=rows;
  for(const [field,spec] of Object.entries(m.computed)){
    const fn=CALCS[spec.calc]; if(fn) out=fn(out, field);
  }
  return out;
}
function calcStat(s, rows){
  try{
    if(s.type==="count") return rows.length;
    if(s.type==="countIf") return rows.filter(r=>r[s.field]===s.eq).length;
    if(s.type==="sum") return rows.filter(r=>!s.where||Object.entries(s.where).every(([k,v])=>r[k]===v)).reduce((a,r)=>a+(+r[s.field]||0),0);
    if(s.type==="max") return rows.reduce((mx,r)=>Math.max(mx,(+r[s.field]||0)),0);
    if(s.type==="avgComputed"){ const v=rows.map(r=>r[s.field]).filter(x=>x!=null); return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):0; }
  }catch(e){ console.error("stat",e); return "—"; } return "—";
}
const fmt = n => typeof n==="number"?n.toLocaleString("ko-KR"):n;
function filterRows(m, rows, q){ q=(q||"").trim().toLowerCase(); if(!q) return rows;
  const nq=q.replace(/\s+/g,"");
  return rows.filter(r=>m.search.some(f=>{ const v=String(r[f]??"").toLowerCase(); return v.includes(q)||v.replace(/\s+/g,"").includes(nq); })); }

let bookInfoCache={};
async function fetchBookInfo(title, author){
  const key=(title||"")+"|"+(author||"");
  if(bookInfoCache[key]!==undefined) return bookInfoCache[key];
  try{
    const kk=CONFIG.GOOGLE_BOOKS_KEY?("&key="+CONFIG.GOOGLE_BOOKS_KEY):"";
    const q=encodeURIComponent((title||"")+(author?(" "+author):""));
    const d=await fetch(`https://www.googleapis.com/books/v1/volumes?maxResults=5&country=KR&q=${q}${kk}`).then(r=>r.json());
    const norm=x=>String(x||"").toLowerCase().replace(/[\s·:,\-–—()\[\]'"!?、。]/g,"");
    const qt=norm(title);
    let v=null;                                        // 제목이 실제로 맞는 결과만 채택(엉뚱한 표지 방지)
    for(const it of (d.items||[])){ const vi=it.volumeInfo||{}; const t=norm((vi.title||"")+(vi.subtitle||""));
      if(qt && t && (t.includes(qt) || qt.includes(t))){ v=vi; break; } }
    if(v){ const desc=String(v.description||"").replace(/<[^>]+>/g,"").trim();
      const cover=String((v.imageLinks&&v.imageLinks.thumbnail)||"").replace(/^http:/,"https:");
      bookInfoCache[key]={ desc, cover:cover||null, pages:v.pageCount||null, publisher:v.publisher||"", rating:(v.averageRating!=null?+v.averageRating:null), ratingsCount:(v.ratingsCount||0) };
    } else { bookInfoCache[key]={ desc:"", cover:null, pages:null, publisher:"", rating:null, ratingsCount:0 }; }   // 못 맞추면 표지 안 씀
  }catch(e){ bookInfoCache[key]=null; }
  return bookInfoCache[key];
}
let mtnInfoCache={}, userGeo=null, geoAsked=false, _mtnLoading=false;
function haversineKm(la1,lo1,la2,lo2){ const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180,
  x=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x)); }
async function fetchMtnInfo(name){   // 위키백과 MediaWiki API: 대표사진 + 좌표(요약API엔 좌표가 없어서 교체)
  if(mtnInfoCache[name]!==undefined) return mtnInfoCache[name];
  try{
    const u=`https://ko.wikipedia.org/w/api.php?action=query&prop=coordinates%7Cpageimages&piprop=thumbnail&pithumbsize=240&redirects=1&titles=${encodeURIComponent(name)}&format=json&origin=*`;
    const d=await fetch(u).then(r=>r.json());
    const pages=d&&d.query&&d.query.pages; let cover=null,lat=null,lon=null;
    if(pages){ const pg=Object.values(pages)[0]||{}; if(pg.thumbnail) cover=pg.thumbnail.source; if(pg.coordinates&&pg.coordinates[0]){ lat=pg.coordinates[0].lat; lon=pg.coordinates[0].lon; } }
    mtnInfoCache[name]={cover,lat,lon};
  }catch(e){ mtnInfoCache[name]=null; }
  return mtnInfoCache[name];
}
function ensureGeo(){ return new Promise(res=>{ if(userGeo||geoAsked) return res(userGeo); geoAsked=true;
  if(!navigator.geolocation) return res(null);
  navigator.geolocation.getCurrentPosition(p=>{ userGeo={lat:p.coords.latitude,lng:p.coords.longitude}; res(userGeo); }, ()=>res(null), {timeout:8000,maximumAge:600000}); }); }

let movieInfoCache={}, personCache={};
async function fetchMovieInfo(orig, kor, year){
  const key=(orig||kor)+"|"+(year||"");
  if(movieInfoCache[key]!==undefined) return movieInfoCache[key];
  try{
    const q=encodeURIComponent(orig||kor);
    const u=`${CONFIG.TMDB_BASE}/search/movie?api_key=${CONFIG.TMDB_KEY}&language=ko-KR&query=${q}${year?`&year=${year}`:""}`;
    const d=await fetch(u).then(r=>r.json()); const m=(d.results||[])[0];
    movieInfoCache[key]= m
      ? { poster:m.poster_path?("https://image.tmdb.org/t/p/w342"+m.poster_path):null, overview:m.overview||"줄거리 정보 없음", rating:m.vote_average?m.vote_average.toFixed(1):"-", tmdbId:m.id }
      : { poster:null, overview:"정보 없음", rating:"-", tmdbId:null };
  }catch(e){ movieInfoCache[key]={ poster:null, overview:"불러오기 실패", rating:"-", tmdbId:null }; }
  return movieInfoCache[key];
}
let _ratingFillRunning=false;
async function autofillMovieRatings(){
  if(typeof CONFIG==="undefined" || !CONFIG.DEPLOY || _ratingFillRunning) return;
  const arr=CACHE.movies; if(!arr||!arr.length) return;
  const miss=r=>(r.rating==null||r.rating==="")&&(r.tmdbRating==null||r.tmdbRating==="")&&(r.title||r.orig);
  const todo=arr.filter(miss).slice(0,60); if(!todo.length) return;
  _ratingFillRunning=true; const done=[];
  try{
    for(const r of todo){
      try{ const info=await fetchMovieInfo(r.orig||r.title, r.title, r.year);
        if(info && info.rating && info.rating!=="-"){ r.tmdbRating=info.rating; done.push({_id:r._id, tmdbRating:r.tmdbRating}); } }catch(e){}
      await new Promise(res=>setTimeout(res,250));
    }
    if(done.length){ try{ savePersist("movies",arr); }catch(e){}
      try{ const S=sheetSrc(); if(S.fillRatings) await S.fillRatings("movies", done); }catch(e){}
      try{ if(state.domain==="movies") paintDomain(MANIFESTS.movies); }catch(e){} }
  }finally{ _ratingFillRunning=false; }
  if(arr.filter(miss).length) setTimeout(autofillMovieRatings,600);
}

async function fetchPerson(name){

    const c=await fetch(`${CONFIG.TMDB_BASE}/person/${p.id}/movie_credits?api_key=${CONFIG.TMDB_KEY}&language=ko-KR`).then(r=>r.json());
    const cast=(c.cast||[]).filter(x=>x.poster_path||x.release_date).sort((a,b)=>(b.popularity||0)-(a.popularity||0)).slice(0,12);
    const crew=(c.crew||[]).filter(x=>x.job==="Director"&&(x.poster_path||x.release_date)).sort((a,b)=>(b.popularity||0)-(a.popularity||0)).slice(0,12);

function _isoOf(raw){ const pd=parseDate(String(raw)); if(!pd) return null; return pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0")+"-"+String(pd.getDate()).padStart(2,"0"); }
function buildDayLog(dateStr){
  const lines=[];
  getActive().forEach(id=>{ if(id==="diary"||id==="subs"||id==="travel") return;
    const m=MANIFESTS[id]; if(!m) return; const act=m.activity; if(!act||!act.df) return;
    const logf = DIARY_LOG[id] || (m.custom ? (r=>`- ${m.title}: ${(m.card&&m.card.title)?m.card.title(r):(r._id||"")}`) : null);
    if(!logf) return;
    (CACHE[id]||loadPersist(id)||[]).forEach(r=>{ const raw=r[act.df]; if(!raw) return;
      if(_isoOf(raw)!==dateStr) return; if(act.when && !act.when(r)) return;
      try{ lines.push(logf(r)); }catch(e){} });
  });
  if(getActive().includes("subs")){ const day=parseInt(dateStr.slice(8,10),10);
    (CACHE.subs||loadPersist("subs")||[]).forEach(r=>{ if(r.status!=="구독중") return;
      const pm=String(r.payday||"").match(/(\d{1,2})/); if(pm && parseInt(pm[1],10)===day){
        lines.push(`- ${r.name} 결제일${r.cost?` (${Number(r.cost).toLocaleString()}원)`:""}`); } });
  }
  if(getActive().includes("cards")){ const day=parseInt(dateStr.slice(8,10),10);
    (CACHE.cards||loadPersist("cards")||[]).forEach(r=>{ const pm=String(r.payday||"").match(/(\d{1,2})/); if(pm && parseInt(pm[1],10)===day) lines.push("- "+(r.name||r.issuer||"카드")+" 결제일"); });
  }
  if(getActive().includes("insurance")){ const day=parseInt(dateStr.slice(8,10),10);
    (CACHE.insurance||loadPersist("insurance")||[]).forEach(r=>{ const pm=String(r.payday||"").match(/(\d{1,2})/); if(pm && parseInt(pm[1],10)===day) lines.push("- "+(r.name||r.issuer||"보험")+" 납부일"); });
  }
  if(getActive().includes("travel")){                 // 여행: 기간(시작~종료일) 전체 날짜에 표시
    (CACHE.travel||loadPersist("travel")||[]).forEach(r=>{ if(r.status!=="다녀옴") return;
      const s=_isoOf(r.startDate), e=_isoOf(r.endDate)||s; if(!s) return;
      if(dateStr>=s && dateStr<=e){ try{ lines.push(DIARY_LOG.travel(r)); }catch(_){} } });
  }
  if(getActive().includes("books") && dateStr===todayStr()){
    (CACHE.books||loadPersist("books")||[]).forEach(r=>{ if(r.status==="읽는중" && r.title) lines.push("- 읽는중 "+r.title); });
  }
  return lines;
}
async function fillDiaryLog(d, silent){
  const dateEl=d.querySelector('.rf[data-k="date"]'), contEl=d.querySelector('.rf[data-k="nddaily"]');
  if(!contEl) return;
  const dateStr=(dateEl&&dateEl.value)||todayStr();

    try{ return sourceFor(MANIFESTS[id]).list(id).then(r=>{CACHE[id]=r;savePersist(id,r);}).catch(()=>{}); }catch(e){ return Promise.resolve(); } }));
  const lines=buildDayLog(dateStr);
  if(!lines.length){ if(!silent) alert(dateStr+"에 다른 카테고리 활동 기록이 없어요."); return; }
  const cur=contEl.value||""; const add=lines.filter(l=>cur.indexOf(l)<0);
  if(!add.length){ if(!silent) alert("이미 다 들어가 있어요."); return; }

}

/* 저장을 분야에 맞는 통로로 보냄 (영화=기존 수정통로 / 차계부=nd문(ID) / 도서·명산·러닝=nd문(_id)) */
async function saveRecord(m, row, existing){
  if(m.id==="movies" && !CONFIG.DEPLOY){                       // 영화 정보수정: MOVIE 탭, 원제 기준(전체 행 재작성)
    const base=(CACHE.movies||[]).find(x=>String(x._id)===String((existing&&existing._id)||row._id)) || existing || {};
    const merged=Object.assign({}, base, row);
    merged.recommendList=String(merged.recommend==null?"":merged.recommend).split(/[\/,]+/).map(x=>x.trim()).filter(Boolean);
    return sheetSrc().updateRaw(sheetSrc().tabOf("movies"), (existing&&existing.orig)||merged.orig||merged._id, movieKorRow(merged), "원제");
  }
  if(m.id==="carlog" && !CONFIG.DEPLOY){                        // 차계부: 차계부/CARLOG 탭, _id 또는 ID 자동감지
    const S=sheetSrc(), tab=S.tabOf("carlog"), idk=S.idkeyOf("carlog");
    const kor={};
    (m.fields||[]).forEach(f=>{ kor[f.sheet] = (row[f.k]==null?"":row[f.k]); });
    if(existing) return S.updateRaw(tab, existing._id, kor, idk);
    kor[idk]=String(Date.now());
    return S.appendRaw(tab, kor);
  }
  if(existing) return sheetSrc().update(state.domain, row._id, row);   // 도서·명산·러닝
  return sheetSrc().upsert(state.domain, row);
}
function toggleCardFlag(m,r,key,btn){
  const prev=!!r[key]; r[key]=!prev;
  const it=(CACHE.cards||[]).find(x=>String(x._id)===String(r._id)); if(it) it[key]=r[key];
  const paint=b=>{ const on=!!r[key]; btn.className="btn "+(on?"":"ghost"); btn.textContent=key==="owned"?(on?"✓ 소유":"소유"):(on?"★ 찜":"찜"); };
  paint(); paintDomain(m);
  saveRecord(m, r, r).then(()=>savePersist("cards",CACHE.cards||[])).catch(e=>{ r[key]=prev; if(it) it[key]=prev; paint(); paintDomain(m); alert("저장 실패: "+e.message); });
}
async function deleteRecord(m, r){
  if(!confirm(`'${r.title||r.date||r._id}' 삭제할까요? 되돌릴 수 없어요.`)) return;
  try{
    if(m.id==="carlog"){ const S=sheetSrc(); await S.deleteRaw(S.tabOf("carlog"), r._id, S.idkeyOf("carlog")); }
    else if(m.id==="movies") await sheetSrc().deleteRaw(sheetSrc().tabOf("movies"), r.orig||r._id, "원제");
    else await sheetSrc().remove(state.domain, r._id);
    unmarkPending(m.id, r._id);   // 삭제한 줄은 보호 해제(되살아나지 않게)
    const _c=CACHE[m.id]; if(_c){ const _n=_c.filter(x=>String(x._id)!==String(r._id)); CACHE[m.id]=_n; savePersist(m.id,_n); }
    $("#detail").close(); refreshDomain();
  }catch(e){ alert("삭제 실패: "+e.message); }
}

const CACHE = {};   // 분야별로 한 번 불러온 데이터를 기억 → 탭 전환·검색 때 다시 안 받음
/* 방금 추가한 레코드가 서버 재조회 지연(백엔드 캐시 등)으로 잠깐 사라지지 않게 보호.
   이번 세션에서 새로 추가한 _id만 대상 → 서버가 그 줄을 돌려주면 자동 해제(삭제한 줄이 되살아나지 않음). */
const PENDING_ADD = {};
function markPending(id, rowId){ (PENDING_ADD[id]||(PENDING_ADD[id]=new Set())).add(String(rowId)); }
function unmarkPending(id, rowId){ if(PENDING_ADD[id]) PENDING_ADD[id].delete(String(rowId)); }
function mergePending(id, fresh){
  const s=PENDING_ADD[id]; if(!s||!s.size) return fresh;
  const have=new Set((fresh||[]).map(r=>String(r._id)));
  const cache=CACHE[id]||loadPersist(id)||[]; const extras=[];
  s.forEach(pid=>{ if(have.has(pid)){ s.delete(pid); } else { const it=cache.find(x=>String(x._id)===pid); if(it) extras.push(it); } });
  return extras.length ? [...extras, ...fresh] : fresh;
}
const NDCACHE_TTL=6*3600*1000; /* 6시간 지나면 홈 로드시 자동 재동기화 */
function persistKey(id){ return "nd.cache2."+id; }
function savePersist(id, rows){ try{ store.setItem(persistKey(id), JSON.stringify(rows)); store.setItem(persistKey(id)+"|t", String(Date.now())); }catch(e){} }
function loadPersist(id){ try{ const s=store.getItem(persistKey(id)); const a=s?JSON.parse(s):null; return (Array.isArray(a)&&a.length)?a:null; }catch(e){ return null; } }
function rowsSig(rows){ try{ return rows.length+"|"+rows.slice(0,80).map(r=>Object.keys(r).filter(k=>k!=="_id").map(k=>r[k]).join("¦")).join("§"); }catch(e){ return Math.random()+""; } }

  else addBtn.style.display="none";

  $("#banner").innerHTML="";
  const did = state.domain;                        // 이 호출이 담당하는 분야(비동기 중 바뀌어도 고정)
  if(!CACHE[did]){                                 // 처음 여는 분야만 실제로 불러온다
    const cached = loadPersist(did);               // 지난번 저장분 → 즉시 표시(첫 로딩 체감 빠르게)
    if(cached){

function movieCard(r, no){

    + (r.rewatch?`<span class="wb wb-R">다시볼것</span>`:"")
    + (r.pick?`<span class="wb wb-P">찜</span>`:"");
  const yc = [r.year, r.country, (r.tmdbRating!=null&&r.tmdbRating!==""?("⭐"+r.tmdbRating):"")].filter(Boolean).join(" · ");
  const dir = personSpan(r.director,"director");
  const actorFirst = (r.actors||"").split(/[,，]/)[0].trim();

      ${(r.review&&String(r.review).trim())?`<div class="mv-memo">📝 ${String(r.review).replace(/</g,"&lt;")}</div>`:""}
    </div>
  </div>`;
}
function movieSelectValues(rows, scope){
  const seen=new Set();
  rows.forEach(r=>{
    let arr = scope==="stream" ? (r.streaming||[])
      : scope==="rec" ? ((r.recommendList&&r.recommendList.length)?r.recommendList:String(r.recommend||"").split(/[\/,]+/).map(function(x){return x.trim();}).filter(Boolean))
      : String(r.director||"").split(/[,\/]+/);        // 감독
    arr.forEach(v=>{ const t=String(v).trim(); if(t) seen.add(t); });
  });
  return [...seen].sort((a,b)=>a.localeCompare(b,"ko"));
}
function movieSearch(rows, scope, q, sel){
  if(scope==="director") return sel ? rows.filter(r=>String(r.director||"").includes(sel)) : rows;
  if(scope==="stream")   return sel ? rows.filter(r=>(r.streaming||[]).includes(sel)) : rows;
  if(scope==="rec")      return sel ? rows.filter(function(r){ var a=(r.recommendList&&r.recommendList.length)?r.recommendList:String(r.recommend||"").split(/[\/,]+/).map(function(x){return x.trim();}).filter(Boolean); return a.indexOf(sel)>=0; }) : rows;
  const nq=(q||"").toLowerCase().replace(/\s+/g,""); if(!nq) return rows;
  const norm=s=>String(s==null?"":s).toLowerCase().replace(/\s+/g,"");
  if(scope==="actor") return rows.filter(r=>norm(r.actors).includes(nq));
  return rows.filter(r=>norm(r.title).includes(nq)||norm(r.orig).includes(nq));   // 제목
}
function paintMovies(m){
  renderStats(m, state.rows);
  try{ if(CONFIG.DEPLOY) setTimeout(autofillMovieRatings,300); }catch(e){}
  setMhSub("");
  const scope=state.searchScope||"title";
  const sc=$("#scope"); sc.style.display="flex"; sc.style.flexDirection="row"; sc.classList.add("scopetabs");     // 검색 범위 탭(밑줄·균등)
  const scopes=[["title","제목"],["director","감독"],["actor","배우"],["stream","스트리밍"],["rec","추천"]];
  sc.innerHTML=scopes.map(([v,l])=>`<button class="chip ${scope===v?'on':''}" data-sc="${v}">${l}</button>`).join("");
  sc.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ state.searchScope=b.dataset.sc; state.query=""; state.selectQ=""; $("#search").value=""; state.page=0; paintMovies(m); });

  // 제목·배우 = 글자 입력(🔍 토글) / 감독·스트리밍·추천 = 드롭다운 (옛 앱과 동일)
  const useSelect=["director","stream","rec"].includes(scope);
  const selEl=$("#mvselect");
  if(useSelect){
    const vals=movieSelectValues(state.rows, scope);
    selEl.innerHTML=`<option value="">전체</option>`+vals.map(v=>`<option value="${v.replace(/"/g,'&quot;')}">${v}</option>`).join("");
    selEl.value=state.selectQ||"";
    selEl.onchange=()=>{ state.selectQ=selEl.value; state.page=0; paintMovies(m); };
  }
  applySearchUI(m);
  $("#picker").style.display="none";   // 정렬은 아래 카운트 줄로 이동

  let rows=movieSearch(state.rows, scope, state.query, state.selectQ);
  rows=applyStatFilter(m, rows);
  const sort=state.sort||"default", asc=state.sortAsc;
  if(sort==="rating") rows=[...rows].sort((a,b)=>{const ra=(parseFloat(a.rating)||parseFloat(a.tmdbRating)||0), rb=(parseFloat(b.rating)||parseFloat(b.tmdbRating)||0); const d=ra-rb; return asc?d:-d;});
  else if(sort==="year") rows=[...rows].sort((a,b)=>{const d=(a.year||0)-(b.year||0); return asc?d:-d;});
  else if(sort==="title") rows=[...rows].sort((a,b)=>{const d=String(a.title||"").localeCompare(String(b.title||""),"ko"); return asc?-d:d;});

  const total=rows.length, shown=rows.slice(0,(state.page+1)*MOVIE_PER); NAV_LIST=shown;
  const sorts=[["default","기본"],["rating","평점"],["year","연도"],["title","제목"]];
  const sortBtns=sorts.map(([v,l])=>{ const on=(state.sort||"default")===v;
    const arrow=v==="default"?"":(on?(state.sortAsc?"↑":"↓"):"↓");
    return `<button class="sort-btn ${on?'on':''}" data-s="${v}">${l}${arrow}</button>`; }).join("");
  const cnt=$("#count"); cnt.classList.add("countrow");
  cnt.innerHTML=`<span class="cnt-lbl">총 ${total}건${state.statFilter!=null?" · 필터":""}</span><span class="sort-btns">${sortBtns}</span>`;
  cnt.querySelectorAll(".sort-btn").forEach(b=>b.onclick=()=>{ const s=b.dataset.s;
    if(s===(state.sort||"default")&&s!=="default") state.sortAsc=!state.sortAsc;
    else { state.sort=s; state.sortAsc=false; }
    state.page=0; paintMovies(m); });
  const _q=(state.query||"").replace(/</g,"&lt;");
  const emptyM = (_q && (state.searchScope||"title")==="title")
    ? `<div class="noresult"><div class="nr-t">검색 결과 없음</div><div class="nr-s">"${_q}"는 목록에 없어요</div><button class="btn nr-add" id="nrAdd">+ "${_q}" 새로 추가</button></div>`
    : `<div class="count">결과가 없습니다.</div>`;
  $("#list").innerHTML = (shown.map((r,i)=>movieCard(r,i+1)).join("")||emptyM)
    + (shown.length<total?`<button class="btn ghost" id="moreBtn" style="width:100%;margin-top:10px">더 보기 (${total-shown.length}편)</button>`:"");
  $("#list").querySelectorAll(".card").forEach((b,i)=>{ const r=shown[i]; if(r){ b.onclick=()=>openDetail(m, r); } });
  { const na=$("#nrAdd"); if(na) na.onclick=()=>{ openAddMovie(); const mq=$("#mq"); if(mq){ mq.value=state.query; mq.dispatchEvent(new Event("input")); } }; }
  document.querySelectorAll(".mvcard .plink").forEach(el=>el.onclick=e=>{ e.stopPropagation(); openPersonModal(el.dataset.name, el.dataset.role); });
  const more=$("#moreBtn"); if(more) more.onclick=()=>{ state.page++; paintMovies(m); };
  lazyPosters();
}
function lazyPosters(){   // 화면에 들어온 카드만 TMDB에서 포스터 로드(메모리 캐시)
  if(!CONFIG.TMDB_KEY) return;
  const io=new IntersectionObserver((ents,obs)=>{
    ents.forEach(async e=>{ if(!e.isIntersecting) return; const el=e.target; obs.unobserve(el);
      const q=el.dataset.title||el.dataset.orig; if(!q) return;
      const key=q+"|"+(el.dataset.year||"");
      if(posterCache[key]===undefined){
        posterCache[key]=null;
        try{ const u=`${CONFIG.TMDB_BASE}/search/movie?api_key=${CONFIG.TMDB_KEY}&language=ko-KR&query=${encodeURIComponent(q)}${el.dataset.year?`&year=${el.dataset.year}`:""}`;
          const d=await fetch(u).then(r=>r.json()); const hit=(d.results||[])[0];
          posterCache[key]=hit&&hit.poster_path?("https://image.tmdb.org/t/p/w185"+hit.poster_path):null;
        }catch(_){ posterCache[key]=null; }
      }
      if(posterCache[key]) el.innerHTML=`<img src="${posterCache[key]}" alt="" style="width:100%;height:100%;object-fit:cover">`;
    });
  },{rootMargin:"300px"});
  document.querySelectorAll(".thumb[data-poster]").forEach(el=>io.observe(el));
}

}

function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseDate(x){ x=String(x==null?"":x).trim(); if(!x) return null; let m;
  if(m=x.match(/^(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})/)) return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=x.match(/^(\d{2})[-.\/](\d{1,2})[-.\/](\d{1,2})/)) return new Date(2000+ +m[1],+m[2]-1,+m[3]);
  const d=new Date(x); return isNaN(d)?null:d; }
function inPeriod(d, period){ if(period==="all") return true; if(!d) return false; const now=new Date();
  if(period==="today") return d.toDateString()===now.toDateString();
  if(period==="month") return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  if(period==="week"){ const s=new Date(now); const off=(now.getDay()+6)%7; s.setDate(now.getDate()-off); s.setHours(0,0,0,0); return d>=s; }
  return true; }

function dashEvents(ids, data){   // 분야별 '한 것'(activity) → {t:날짜, id} 목록
  const ev=[];
  ids.forEach(id=>{ const m=MANIFESTS[id]; if(!m || !m.activity) return; const act=m.activity;
    (data[id]||[]).forEach(r=>{ if(!act.when(r)) return; const t=parseDate(r[act.df]); if(t) ev.push({t, id}); }); });
  return ev;
}
function chartMonths(ids, ev){    // 최근 6개월 · 분야별 누적 막대
  const now=new Date(), months=[];
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push({y:d.getFullYear(), m:d.getMonth()}); }
  const actIds=ids.filter(id=>MANIFESTS[id] && MANIFESTS[id].activity);
  const counts=months.map(()=>{ const o={}; actIds.forEach(id=>o[id]=0); return o; });
  ev.forEach(e=>{ const mi=months.findIndex(mm=>mm.y===e.t.getFullYear()&&mm.m===e.t.getMonth()); if(mi>=0) counts[mi][e.id]++; });
  const totals=counts.map(c=>actIds.reduce((s,id)=>s+c[id],0));
  const max=Math.max(1,...totals), W=320,H=172,padB=26,padT=14,padL=6,padR=6;
  const gw=(W-padL-padR)/months.length, bw=Math.min(30, gw*0.58);
  let bars="";
  months.forEach((mm,mi)=>{ const cx=padL+gw*mi+gw/2; let y=H-padB;
    actIds.forEach(id=>{ const v=counts[mi][id]; if(!v) return; const h=(H-padB-padT)*(v/max); y-=h;
      bars+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="2" fill="${domColor(id)}"><title>${MANIFESTS[id].title} ${v}</title></rect>`; });
    bars+=`<text x="${cx.toFixed(1)}" y="${H-9}" text-anchor="middle" font-size="10" fill="#888">${mm.m+1}월</text>`;
    if(totals[mi]){ const ty=(H-padB)-((H-padB-padT)*(totals[mi]/max))-4; bars+=`<text x="${cx.toFixed(1)}" y="${ty.toFixed(1)}" text-anchor="middle" font-size="9" fill="#888">${totals[mi]}</text>`; }
  });
  const legend=actIds.map(id=>`<span class="dash-lg"><i style="background:${domColor(id)}"></i>${MANIFESTS[id].icon} ${MANIFESTS[id].title}</span>`).join("");
  const empty=totals.reduce((a,b)=>a+b,0)===0;
  return `<div class="dash-note">최근 6개월 · 분야별 한 것</div><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${bars}</svg><div class="dash-legend">${legend}</div>`
    + (empty?`<div class="dash-names" style="color:var(--ink-soft);text-align:center;margin-top:8px">아직 날짜가 기록된 활동이 없어요</div>`:"");
}
function chartCalendar(ids, ev){  // 이번달 · 날짜별 히트맵(전 분야 합산)
  const now=new Date(), y=now.getFullYear(), mo=now.getMonth();
  const days=new Date(y,mo+1,0).getDate(), offset=new Date(y,mo,1).getDay();
  const perDay={}; ev.forEach(e=>{ if(e.t.getFullYear()===y&&e.t.getMonth()===mo){ const d=e.t.getDate(); perDay[d]=(perDay[d]||0)+1; } });
  const vals=Object.values(perDay), max=Math.max(1,...vals);
  const wd=["일","월","화","수","목","금","토"];
  let cells=wd.map(d=>`<div class="cal-h">${d}</div>`).join("");
  for(let i=0;i<offset;i++) cells+=`<div class="cal-c cal-e"></div>`;
  for(let d=1;d<=days;d++){ const v=perDay[d]||0, lvl=v?Math.min(4,Math.ceil(4*v/max)):0;
    cells+=`<div class="cal-c${lvl?' lvl'+lvl:''}" title="${y}-${mo+1}-${d} · ${v}건">${d}</div>`; }
  const total=vals.reduce((a,b)=>a+b,0);
  return `<div class="dash-note">${mo+1}월 · 총 ${total}건</div><div class="cal-grid">${cells}</div>`

}
function chartTrend(ids, ev){     // 최근 10주 · 주별 합산 추이
  const now=new Date(), weeks=[], monday=new Date(now), off=(now.getDay()+6)%7;
  monday.setDate(now.getDate()-off); monday.setHours(0,0,0,0);
  for(let i=9;i>=0;i--){ const sd=new Date(monday); sd.setDate(monday.getDate()-7*i); weeks.push(sd); }
  const counts=weeks.map(()=>0);
  ev.forEach(e=>{ for(let i=weeks.length-1;i>=0;i--){ if(e.t>=weeks[i]){ counts[i]++; break; } } });
  const max=Math.max(1,...counts), n=weeks.length, W=320,H=150,padB=22,padT=14,padL=10,padR=10;
  const sx=(W-padL-padR)/(n-1);
  const pts=counts.map((v,i)=>[padL+sx*i,(H-padB)-(H-padB-padT)*(v/max)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${pts[n-1][0].toFixed(1)} ${H-padB} L ${pts[0][0].toFixed(1)} ${H-padB} Z`;
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="#16a34a"><title>${counts[i]}건</title></circle>`).join("");
  let labs=""; weeks.forEach((sd,i)=>{ if(i%2===0) labs+=`<text x="${(padL+sx*i).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="9" fill="#888">${sd.getMonth()+1}/${sd.getDate()}</text>`; });
  const total=counts.reduce((a,b)=>a+b,0);
  return `<div class="dash-note">최근 10주 · 총 ${total}건</div><svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><path d="${area}" fill="var(--accent-wash)" stroke="none"/><path d="${line}" fill="none" stroke="#16a34a" stroke-width="2"/>${dots}${labs}</svg>`;
}

function mbtiScore(ans){

  var ei=axis("E","I"), sn=axis("S","N"), tf=axis("T","F"), jp=axis("J","P");
  var type=ei.letter+sn.letter+tf.letter+jp.letter;

/* ══════════════ 생리주기 (Period Tracker) ══════════════
   저장: localStorage nd.period {cycles:[{_id,start,end,flow,symptoms:[],mood,note}]}
   + 구글시트 '생리주기' 탭 동기화(기기간 공유). MBTI와 동일 패턴. */
var PD_TAB="생리주기", PD_HEAD=["_id","시작일","종료일","양","증상","기분","메모"];
var PD_SYMPTOMS=["복통","두통","요통","유방통","붓기","여드름","피로","식욕↑","불면","어지럼"];
var PD_MOODS=["평온","예민","우울","불안","의욕↑","눈물"];
var PD_FLOWS=["적음","보통","많음"];
var pdCalY=null, pdCalM=null, pdEditId=null;

function _pdEsc(x){ return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function _pdSaved(){ try{ var raw=store.getItem("nd.period"); var o=raw?JSON.parse(raw):null; if(!o||!o.cycles) return {cycles:[]}; return o; }catch(e){ return {cycles:[]}; } }
function _pdWrite(o){ try{ store.setItem("nd.period", JSON.stringify(o)); }catch(e){} }
function pdParse(s){ if(!s) return null; var p=String(s).split(/[.\-\/]/).map(function(x){return parseInt(x,10);}); if(p.length<3||isNaN(p[0])||isNaN(p[1])||isNaN(p[2])) return null; return new Date(p[0], p[1]-1, p[2]); }
function pdFmt(d){ if(!d) return ""; return d.getFullYear()+"."+String(d.getMonth()+1).padStart(2,"0")+"."+String(d.getDate()).padStart(2,"0"); }
function pdFmtMD(d){ if(!d) return ""; return (d.getMonth()+1)+"."+String(d.getDate()).padStart(2,"0"); }
function pdToday(){ var d=new Date(); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function pdAdd(d,n){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()+n); }
function pdDiff(a,b){ return Math.round((b-a)/86400000); } /* b-a in days */
function pdSameDay(a,b){ return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

/* 기록을 시작일 오름차순 정렬해서 반환 */
function pdCycles(){ var o=_pdSaved(); var arr=(o.cycles||[]).map(function(c){ return c; }).filter(function(c){ return c&&c.start; });
  arr.sort(function(a,b){ var da=pdParse(a.start), db=pdParse(b.start); return (da?da.getTime():0)-(db?db.getTime():0); }); return arr; }

/* 통계 + 예측 */
function pdStats(){
  var cy=pdCycles(); var starts=cy.map(function(c){return pdParse(c.start);}).filter(Boolean);
  var st={count:cy.length, cycles:cy, avgCycle:28, avgPeriod:5, lastStart:null, next:null, ovul:null, fertS:null, fertE:null, dday:null, phase:"", inPeriod:false, periodDay:0, minCycle:null, maxCycle:null};
  if(!starts.length) return st;
  st.lastStart=starts[starts.length-1];
  /* 주기 = 연속 시작일 간격 평균 */
  if(starts.length>=2){ var gaps=[]; for(var i=1;i<starts.length;i++){ var g=pdDiff(starts[i-1],starts[i]); if(g>=15&&g<=60) gaps.push(g); }
    if(gaps.length){ var s=0; gaps.forEach(function(g){s+=g;}); st.avgCycle=Math.round(s/gaps.length); st.minCycle=Math.min.apply(null,gaps); st.maxCycle=Math.max.apply(null,gaps); } }
  /* 기간 = 시작~종료 평균 */
  var pl=[]; cy.forEach(function(c){ var a=pdParse(c.start), b=pdParse(c.end); if(a&&b){ var d=pdDiff(a,b)+1; if(d>=1&&d<=14) pl.push(d); } });
  if(pl.length){ var ps=0; pl.forEach(function(d){ps+=d;}); st.avgPeriod=Math.round(ps/pl.length); }
  st.next=pdAdd(st.lastStart, st.avgCycle);
  var today=pdToday();
  /* 이미 지난 예정일이면 다음 주기로 밀기 */
  var guard=0; while(pdDiff(today, st.next)< -1 && guard<12){ st.next=pdAdd(st.next, st.avgCycle); guard++; }
  st.ovul=pdAdd(st.next, -14);
  st.fertS=pdAdd(st.ovul, -5); st.fertE=pdAdd(st.ovul, 1);
  st.dday=pdDiff(today, st.next);
  /* 현재 생리중인지 (마지막 시작일 ~ +기간) */
  var lastEnd=null; var lc=cy[cy.length-1]; if(lc){ var le=pdParse(lc.end); lastEnd=le?le:pdAdd(st.lastStart, st.avgPeriod-1); }
  if(pdDiff(st.lastStart, today)>=0 && pdDiff(today, lastEnd)>=0){ st.inPeriod=true; st.periodDay=pdDiff(st.lastStart, today)+1; }
  /* 국면 */
  if(st.inPeriod) st.phase="생리 "+st.periodDay+"일차";
  else if(today>=st.fertS && today<=st.fertE){ st.phase= pdSameDay(today,st.ovul)?"배란일":"가임기"; }
  else if(today>st.ovul && today<st.next) st.phase="황체기";
  else st.phase="여포기";
  return st;
}

function pdPeriodDaySet(y,mo){ var out={}; try{ var st=pdStats(); (st.cycles||[]).forEach(function(c){ var a=pdParse(c.start); if(!a) return; var e=pdParse(c.end); if(!e) e=pdAdd(a,(st.avgPeriod||5)-1); var d=new Date(a.getFullYear(),a.getMonth(),a.getDate()), g=0; while(d<=e && g<40){ if(d.getFullYear()===y&&d.getMonth()===mo){ out[y+"-"+String(mo+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")]=true; } d=pdAdd(d,1); g++; } }); }catch(e){} return out; }
function pdPhaseForDate(dstr){ try{ var d=pdParse(dstr); if(!d) return ""; var st=pdStats(); for(var i=0;i<(st.cycles||[]).length;i++){ var c=st.cycles[i]; var a=pdParse(c.start); if(!a) continue; var e=pdParse(c.end); if(!e) e=pdAdd(a,(st.avgPeriod||5)-1); if(pdDiff(a,d)>=0 && pdDiff(d,e)>=0) return "생리 "+(pdDiff(a,d)+1)+"일차"; } return ""; }catch(e){ return ""; } }
function pdMoodInsight(){ try{ var diary=(typeof CACHE!=="undefined"&&CACHE["diary"])||(typeof loadPersist==="function"&&loadPersist("diary"))||[]; if(!diary.length) return null; var cy=pdCycles(); if(cy.length<2) return null; var starts=cy.map(function(c){return pdParse(c.start);}).filter(Boolean); var pms={total:0,moods:{}}; diary.forEach(function(e){ var d=pdParse(e.date); if(!d) return; var mood=String(e.mood||"").trim(); if(!mood) return; var inPms=false; starts.forEach(function(sx){ var df=pdDiff(d,sx); if(df>=1&&df<=5) inPms=true; }); if(inPms){ pms.total++; pms.moods[mood]=(pms.moods[mood]||0)+1; } }); if(pms.total<3) return null; var top=Object.keys(pms.moods).sort(function(a,b){return pms.moods[b]-pms.moods[a];})[0]; var pct=Math.round(pms.moods[top]/pms.total*100); if(pct<40) return null; return { topMood:top, pct:pct, n:pms.total }; }catch(e){ return null; } }

/* 달력 */
function pdCalHTML(st){
  var y=pdCalY, m=pdCalM;
  var first=new Date(y,m,1); var startDow=first.getDay(); var dim=new Date(y,m+1,0).getDate();
  var today=pdToday();
  function inRecordedPeriod(d){ for(var i=0;i<st.cycles.length;i++){ var c=st.cycles[i]; var a=pdParse(c.start); if(!a) continue; var e=pdParse(c.end); if(!e) e=pdAdd(a, st.avgPeriod-1); if(pdDiff(a,d)>=0 && pdDiff(d,e)>=0) return true; } return false; }
  function inPredicted(d){ if(!st.next) return false; var e=pdAdd(st.next, st.avgPeriod-1); return pdDiff(st.next,d)>=0 && pdDiff(d,e)>=0; }
  function inFertile(d){ return st.fertS && pdDiff(st.fertS,d)>=0 && pdDiff(d,st.fertE)>=0; }
  var cells="";
  for(var i=0;i<startDow;i++) cells+='<div class="pdCell pdEmpty"></div>';
  for(var day=1;day<=dim;day++){
    var d=new Date(y,m,day); var cls="pdCell"; var mark="";
    if(inRecordedPeriod(d)) cls+=" pdPeriod";
    else if(inPredicted(d)) cls+=" pdPred";
    else if(st.ovul&&pdSameDay(d,st.ovul)) cls+=" pdOvul";
    else if(inFertile(d)) cls+=" pdFert";
    if(pdSameDay(d,today)) cls+=" pdToday";
    cells+='<div class="'+cls+'"><span>'+day+'</span>'+mark+'</div>';
  }
  var dows=["일","월","화","수","목","금","토"].map(function(w){return '<div class="pdDow">'+w+'</div>';}).join("");
  return '<div class="pdCalWrap"><div class="pdCalHead"><button class="pdNav" id="pdCalPrev">‹</button><span class="pdCalTit">'+y+'년 '+(m+1)+'월</span><button class="pdNav" id="pdCalNext">›</button></div>'
    +'<div class="pdGrid">'+dows+cells+'</div>'
    +'<div class="pdLegend"><span><i class="pdLgP"></i>생리</span><span><i class="pdLgPr"></i>예상</span><span><i class="pdLgF"></i>가임기</span><span><i class="pdLgO"></i>배란</span></div></div>';
}

/* 기록 리스트 */
function pdRecordsHTML(st){
  if(!st.count) return "";
  var cy=st.cycles.slice().reverse().slice(0,12);
  var rows=cy.map(function(c){
    var a=pdParse(c.start), e=pdParse(c.end);
    var dur=(a&&e)?(pdDiff(a,e)+1)+"일":"";
    var tags=[]; if(c.flow) tags.push(c.flow); if(c.mood) tags.push(c.mood);
    (c.symptoms||[]).slice(0,2).forEach(function(s){ tags.push(s); });
    var meta=[pdFmt(a)+(e?" ~ "+pdFmtMD(e):""), dur].filter(Boolean).join(" · ");
    return '<button class="pdRec" data-id="'+_pdEsc(c._id)+'"><span class="pdRecD">'+meta+'</span>'
      +(tags.length?'<span class="pdRecT">'+tags.map(function(t){return '<i>'+_pdEsc(t)+'</i>';}).join("")+'</span>':'')+'</button>';
  }).join("");
  return '<div class="pdSec"><div class="pdSecH">📋 기록 ('+st.count+')</div>'+rows+'</div>';
}

/* 기록 입력/수정 폼 */
function pdLogForm(id){

function _wTruthy(v){ return v===true||v==="TRUE"||v==="true"||v==="O"||v==="Y"||v==="예"||v===1||v==="1"; }
function _wEsc(x){ return String(x==null?"":x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function _wNum(v){ if(v==null||v==="") return null; var n=parseFloat(v); return isNaN(n)?null:n; }
function _wDone(id,r){
  if(_wNum(r.rating)!=null) return true;
  if(_wTruthy(r.watched)||_wTruthy(r.climbed)) return true;
  var st=String(r.status||""); if(st==="읽음"||st==="다녀옴"||st==="관람"||st==="완료"||st==="봤음"||st==="방문") return true;
  if(id==="running") return true;
  return false;
}
function wrapStats(ids, data){
  var S={total:0,experienced:0,rated:0,ratingSum:0,best:null,cats:[]};
  ids.forEach(function(id){
    var rows=data[id]||[]; if(!rows.length) return;
    var m=MANIFESTS[id]; var exp=0;
    rows.forEach(function(r){
      var rt=_wNum(r.rating);
      if(rt!=null){ S.rated++; S.ratingSum+=rt; if(!S.best||rt>S.best.rating) S.best={rating:rt,title:(r.title||r.name||""),cat:m.title}; }
      if(_wDone(id,r)) exp++;
    });
    S.total+=rows.length; S.experienced+=exp;
    S.cats.push({id:id,title:m.title,icon:m.icon,n:rows.length,exp:exp});
  });
  S.cats.sort(function(a,b){return b.n-a.n;});
  S.avg=S.rated?Math.round(S.ratingSum/S.rated*10)/10:null;
  S.expPct=S.total?Math.round(S.experienced/S.total*100):0;
  // 영화
  if((data.movies||[]).length){ var mv=data.movies; var w=mv.filter(function(r){return _wTruthy(r.watched);});
    var cc={},dc={},sum=0,cnt=0,best=null;
    w.forEach(function(r){ var c=String(r.country||"").trim(); if(c) cc[c]=(cc[c]||0)+1; var d=String(r.director||"").trim(); if(d) dc[d]=(dc[d]||0)+1; var rt=_wNum(r.rating); if(rt!=null){sum+=rt;cnt++; if(!best||rt>best.rating)best={rating:rt,title:r.title};} });
    var top=function(o){return Object.keys(o).map(function(k){return [k,o[k]];}).sort(function(a,b){return b[1]-a[1];});};
    S.movies={watched:w.length,avg:cnt?Math.round(sum/cnt*10)/10:null,country:top(cc),director:top(dc).slice(0,4),best:best};
  }
  // 도서
  if((data.books||[]).length){ var bk=data.books; var read=bk.filter(function(r){return String(r.status||"")==="읽음";});
    var g={}; bk.forEach(function(r){ String(r.genre||"").split(/[,\s]+/).forEach(function(x){ x=x.trim(); if(x) g[x]=(g[x]||0)+1; }); });
    S.books={read:read.length,total:bk.length,genres:Object.keys(g).map(function(k){return [k,g[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,6),
      readTitles:read.map(function(r){return r.title;}).filter(Boolean)};
  }
  // 등산
  if((data.mountains||[]).length){ var mt=data.mountains; S.mountains={total:mt.length,climbed:mt.filter(function(r){return _wTruthy(r.climbed);}).map(function(r){return r.title;}).filter(Boolean)}; }
  // 러닝
  if((data.running||[]).length){ var rn=data.running; var dsum=0; rn.forEach(function(r){ var dd=_wNum(r.dist); if(dd)dsum+=dd; });
    var last=rn[rn.length-1]||{}; S.running={count:rn.length,dist:Math.round(dsum*10)/10,memo:String(last.memo||"").trim(),place:String(last.place||"").trim()}; }
  return S;
}

function parseCSV(text){
  text=String(text||"").replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const rows=[]; let cur=[],val="",q=false;
  for(let i=0;i<text.length;i++){ const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){ val+='"'; i++; } else q=false; } else val+=ch; }
    else if(ch==='"') q=true;
    else if(ch===',') { cur.push(val); val=""; }
    else if(ch==='\n'){ cur.push(val); rows.push(cur); cur=[]; val=""; }
    else val+=ch;
  }
  cur.push(val); rows.push(cur);
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}

function wireReorder(box, onCommit){
  let drag=null;
  box.querySelectorAll(".ord-handle").forEach(h=>{
    h.addEventListener("pointerdown", e=>{ e.preventDefault(); drag=h.closest(".ord-row"); if(!drag) return; drag.classList.add("dragging"); try{ box.setPointerCapture(e.pointerId); }catch(_){}} );   // 캡처는 안 움직이는 box에 → 행 재배치 중 lostpointercapture로 끊기지 않음(여러 칸 연속 이동)
  });
  const move=e=>{ if(!drag) return; e.preventDefault(); const y=e.clientY;
    const after=[...box.querySelectorAll(".ord-row:not(.dragging)")].find(sib=>{ const r=sib.getBoundingClientRect(); return y < r.top + r.height/2; });
    if(after){ if(after!==drag.nextSibling) box.insertBefore(drag, after); }
    else { if(drag!==box.lastElementChild) box.appendChild(drag); } };
  const end=()=>{ if(!drag) return; drag.classList.remove("dragging"); drag=null; onCommit([...box.querySelectorAll(".ord-row")].map(r=>r.dataset.id)); };
  box.addEventListener("pointermove", move);
  box.addEventListener("pointerup", end);
  box.addEventListener("pointercancel", end);
  box.addEventListener("lostpointercapture", end);
}

async function freeTabName(name, fields){
  const expected = JSON.stringify(["_id"].concat((fields||[]).map(f=>f.label)));
  async function conflict(t){ try{ const rows=await sheetSrc().readTab(t); if(!rows.length) return false; return JSON.stringify(Object.keys(rows[0]))!==expected; }catch(e){ return false; } }
  let tab=name, n=2;
  while(await conflict(tab)){ tab=name+" ("+n+")"; n++; if(n>50) break; }
  return tab;
}

async function searchBooks(q){
  if(!q || !q.trim()) return [];
  var key = CONFIG.GOOGLE_BOOKS_KEY ? ("&key="+CONFIG.GOOGLE_BOOKS_KEY) : "";
  const url="https://www.googleapis.com/books/v1/volumes?maxResults=6&country=KR&q="+encodeURIComponent(q.trim())+key;
  let res=await fetch(url);
  if(res.status===429){                       // 너무 자주 불러 잠깐 막힘 → 1.2초 쉬고 한 번 더
    await new Promise(r=>setTimeout(r,1200));
    res=await fetch(url);
  }
  if(res.status===429) throw new Error("검색이 잠깐 제한됐어요. 몇 초 뒤 다시 해보거나, 설정 안내대로 '책 검색 키'를 넣으면 해결됩니다.");
  if(!res.ok) throw new Error("HTTP "+res.status);
  const d=await res.json();
  return (d.items||[]).map(it=>{ const v=it.volumeInfo||{};
    return { title:v.title||"", author:(v.authors||[]).join(", "),
      year:parseInt(String(v.publishedDate||"").slice(0,4),10)||null,
      cover:String(v.imageLinks&&v.imageLinks.thumbnail||"").replace(/^http:/,"https:"),
      genre:(v.categories||[]) }; });
}

async function searchMovies(q){
  if(!q || q.trim().length<2) return [];
  const url=`${CONFIG.TMDB_BASE}/search/movie?api_key=${CONFIG.TMDB_KEY}&language=ko-KR&query=${encodeURIComponent(q.trim())}`;
  const res=await fetch(url);
  if(!res.ok) throw new Error("HTTP "+res.status);
  const d=await res.json();
  return (d.results||[]).slice(0,6).map(m=>({
    id:m.id, orig:m.original_title||m.title||"", kor:m.title||m.original_title||"",
    year:(m.release_date||"").slice(0,4), rating:m.vote_average?Math.round(m.vote_average*10)/10:"",
    poster:m.poster_path?("https://image.tmdb.org/t/p/w185"+m.poster_path):"" }));
}
async function fetchMovieExtra(id){   // 감독·배우·국적 (두 번째 호출)

    const [det,cred]=await Promise.all([
      fetch(`${CONFIG.TMDB_BASE}/movie/${id}?api_key=${CONFIG.TMDB_KEY}&language=ko-KR`).then(r=>r.json()),
      fetch(`${CONFIG.TMDB_BASE}/movie/${id}/credits?api_key=${CONFIG.TMDB_KEY}&language=ko-KR`).then(r=>r.json())
    ]);
    return { director:(cred.crew||[]).filter(c=>c.job==="Director").map(c=>c.name).join(", "),
             actors:(cred.cast||[]).slice(0,4).map(c=>c.name).join(", "),
             country:(det.production_countries||[]).map(c=>c.name).join(", ") };
  }catch(e){ return {director:"",actors:"",country:""}; }
}

async function recoLists(id){

function recoPickList(d, lists, catTitle, id, hk){
  return new Promise(res=>{
    const rows=lists.map((l,i)=>{
      const its=l.items||[]; const total=its.length; let got=0;
      if(hk&&id) its.forEach(it=>{ try{ if(recoIsHave(id,it,hk)) got++; }catch(e){} });
      const done=total>0 && got>=total;
      const badge = done ? '<span class="reco-badge done">\u2713 \uB2F4\uAE40</span>'
        : (got>0 ? '<span class="reco-badge part">'+got+'/'+total+' \uB2F4\uAE40</span>' : '<span class="reco-badge">'+total+'\uAC1C</span>');
      const prog = (got>0 && !done) ? '<div class="rc-prog"><i style="width:'+Math.round(got/total*100)+'%"></i></div>' : '';
      return '<div class="reco-item'+(done?' done':'')+'" data-i="'+i+'" style="cursor:pointer"><div class="reco-b"><div class="reco-t">'+l.title+'</div><div class="reco-m">'+(l.subtitle||(total+'\uAC1C'))+'</div>'+prog+'</div>'+badge+'</div>';
    }).join("");
    d.innerHTML=`<div class="dhead"><h3>${catTitle} · 추천 리스트</h3></div><div class="dbody"><div class="count" style="margin:0 0 8px">담고 싶은 리스트를 고르세요</div><div id="rcPick" style="max-height:60vh;overflow:auto;margin:0 -4px">${rows}</div><button class="btn ghost" id="rcPickClose" style="width:100%;margin-top:12px">닫기</button></div>`;
    d.querySelectorAll("#rcPick .reco-item").forEach(el=>el.onclick=()=>res(lists[+el.dataset.i]));
    const c=$("#rcPickClose"); if(c) c.onclick=()=>{ d.close(); res(null); };
  });
}

      if(_dup){ const _cur=String(_dup.recommend||"").split(/[\/,]+/).map(x=>x.trim().toLowerCase()).filter(Boolean);

  function render(){

    }).join("");
    d.innerHTML=`<div class="dhead" style="display:flex;align-items:center;gap:8px;padding-right:42px"><h3 style="margin:0;padding:0;flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:17px">${data.title||"추천 리스트"}</h3>${(listsAll&&listsAll.length>1)?'<button class="btn ghost" id="rcBack" type="button" style="padding:4px 10px;flex:0 0 auto;white-space:nowrap">← 리스트</button>':''}<button class="dclose-x" onclick="this.closest('dialog').close()" aria-label="닫기">✕</button></div>

  }
  render();
}

<script>
(function(){
  if(window.__ndBackGuard) return; window.__ndBackGuard=true;
  var busy=false, trap=false;
  function anyDialog(){ return document.querySelector('dialog[open]'); }
  function domainOpen(){ var d=document.getElementById('domainView'); return !!(d && getComputedStyle(d).display!=='none'); }
  function depth(){ if(anyDialog()) return 2; if(domainOpen()) return 1; return 0; }
  function pushGuard(){ history.pushState({ndTrap:1}, ''); trap=true; }
  function sync(){
    if(busy) return;
    var deep = depth()>0;
    if(deep && !trap){ pushGuard(); }
    else if(!deep && trap){
      if(history.state && history.state.ndTrap){ busy=true; trap=false; history.back(); setTimeout(function(){busy=false;},60); }
      else { trap=false; }
    }
  }
  window.addEventListener('popstate', function(){
    busy=true; trap=false;
    var d=depth();
    if(d===2){
      var dl=document.querySelectorAll('dialog[open]');
      var top=dl[dl.length-1];
      if(top){
        var _mb=top.querySelector('.mbBack'), _rb=top.querySelector('#rcBack'), _wc=top.querySelector('.wclose');
        var _step=_mb||_rb||((_wc&&/^\s*←/.test(_wc.textContent||''))?_wc:null);
        try{ if(_step) _step.click(); else top.close(); }catch(e){ try{ top.close(); }catch(_e){} }
      }
      setTimeout(function(){ if(depth()>0){ pushGuard(); } busy=false; }, 0);
    } else if(d===1){
      try{ if(typeof goHome==='function') goHome(); }catch(e){}
      setTimeout(function(){ busy=false; }, 0);
    } else { busy=false; }
  });
  var mo=new MutationObserver(function(){ sync(); });
  try{ mo.observe(document.documentElement,{subtree:true,attributes:true,childList:true,attributeFilter:['open','style','class']}); }catch(e){}
  setInterval(sync, 500);
  document.addEventListener('DOMContentLoaded', sync);
  setTimeout(sync, 300);
})();
</script>
