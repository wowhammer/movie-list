<style>
  :root{
    --paper:#EDEBE3; --card:#FCFBF8; --ink:#23241F; --ink-soft:#6E6C62;
    --line:#D8D5CA; --line-soft:#E6E3D9;
    --accent:#7A5C2E; --accent-wash:rgba(122,92,46,.10);
    --ok:#3d7a4e; --warn:#b25b3a;
    --serif:"Gowun Batang",serif; --sans:"IBM Plex Sans KR",system-ui,sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  [data-domain="movies"]{ --accent:#7A5C2E; --accent-wash:rgba(122,92,46,.10); }
  [data-domain="carlog"]{ --accent:#37596A; --accent-wash:rgba(55,89,106,.10); }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.5; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:860px; margin:0 auto; padding:24px 20px 80px; }
  .masthead{ display:flex; align-items:baseline; gap:12px; border-bottom:2px solid var(--ink); padding-bottom:10px; }
  .masthead h1{ font-family:var(--serif); font-weight:700; font-size:26px; margin:0; }
  .masthead .sub{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.18em; }
  .masthead .spacer{ flex:1; }
  .src-chip{ font-family:var(--mono); font-size:10.5px; padding:4px 8px; border-radius:2px; border:1px solid var(--line); color:var(--ink-soft); }
  .src-chip.live{ color:var(--ok); border-color:var(--ok); }
  .icon-btn{ font-family:var(--mono); font-size:11px; cursor:pointer; background:none; border:1px solid var(--line); color:var(--ink-soft); padding:5px 9px; border-radius:2px; }
  .icon-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .tabs{ display:flex; margin-top:16px; border-bottom:1px solid var(--line); }
  .tab{ font-size:15px; font-weight:500; cursor:pointer; background:none; border:none; color:var(--ink-soft); padding:10px 16px 12px; border-bottom:2px solid transparent; margin-bottom:-1px; display:flex; align-items:center; gap:7px; }
  .tab[aria-selected="true"]{ color:var(--ink); border-bottom-color:var(--accent); }
  .tab .vol{ font-family:var(--mono); font-size:10px; color:var(--ink-soft); }
  .stats{ display:flex; flex-wrap:wrap; gap:26px; padding:18px 2px 14px; }
  .stat .n{ font-family:var(--mono); font-weight:600; font-size:22px; color:var(--accent); }
  .stat .l{ font-size:11px; color:var(--ink-soft); }
  .search{ width:100%; font-family:var(--sans); font-size:14px; padding:10px 12px; background:var(--card); border:1px solid var(--line); border-radius:3px; color:var(--ink); }
  .search:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-wash); }
  .count{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin:12px 2px 8px; }
  .list{ display:flex; flex-direction:column; gap:10px; }
  .card{ display:grid; grid-template-columns:auto 1fr auto; gap:14px; align-items:start; background:var(--card); border:1px solid var(--line-soft); border-radius:4px; padding:14px 16px; cursor:pointer; text-align:left; width:100%; font:inherit; color:inherit; }
  .card:hover{ border-color:var(--accent); }
  .card:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .cat-no{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); padding-top:3px; min-width:44px; }
  .thumb{ width:44px; height:62px; border-radius:3px; background:var(--accent-wash); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--accent); border:1px solid var(--line-soft); overflow:hidden; }
  .thumb img{ width:100%; height:100%; object-fit:cover; }
  .body h3{ font-family:var(--serif); font-size:17px; font-weight:700; margin:0 0 3px; }
  .body .meta{ font-size:12.5px; color:var(--ink-soft); }
  .tags{ display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .tag{ font-family:var(--mono); font-size:10px; color:var(--ink-soft); border:1px solid var(--line); border-radius:2px; padding:2px 6px; }
  .flags{ display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .flag{ font-size:10.5px; font-family:var(--mono); padding:2px 7px; border-radius:2px; white-space:nowrap; }
  .flag.on{ background:var(--accent-wash); color:var(--accent); }
  .flag.star{ color:var(--accent); font-weight:600; font-size:12px; }
  .kv{ display:flex; gap:18px; flex-wrap:wrap; font-family:var(--mono); font-size:12.5px; margin-top:6px; }
  .kv b{ color:var(--accent); font-weight:600; }
  dialog{ border:1px solid var(--line); border-radius:6px; padding:0; max-width:460px; width:92%; background:var(--card); color:var(--ink); }
  dialog::backdrop{ background:rgba(20,20,16,.45); }
  .dhead{ padding:16px 18px; border-bottom:1px solid var(--line-soft); }
  .dhead h3{ font-family:var(--serif); margin:0; font-size:20px; }
  .dbody{ padding:16px 18px; display:flex; flex-direction:column; gap:9px; }
  .drow{ display:grid; grid-template-columns:96px 1fr; gap:10px; font-size:13.5px; }
  .drow .k{ color:var(--ink-soft); font-family:var(--mono); font-size:11.5px; padding-top:2px; }
  .dclose{ display:block; margin:6px 18px 18px auto; font-family:var(--mono); font-size:12px; cursor:pointer; background:var(--ink); color:var(--paper); border:none; padding:8px 16px; border-radius:3px; }
  .set label{ display:block; font-size:12px; color:var(--ink-soft); margin:12px 0 4px; }
  .set input{ width:100%; font-family:var(--mono); font-size:12px; padding:8px 10px; border:1px solid var(--line); border-radius:3px; background:var(--paper); }
  .set .hint{ font-size:11px; color:var(--ink-soft); margin-top:4px; }
  .btn{ font-family:var(--sans); font-size:13px; font-weight:500; cursor:pointer; background:var(--accent); color:#fff; border:none; padding:9px 16px; border-radius:3px; }
  .btn.ghost{ background:none; color:var(--ink); border:1px solid var(--line); }
  .btn.ghost.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .banner{ font-size:12.5px; padding:9px 12px; border-radius:3px; margin:10px 0; }
  .banner.warn{ background:rgba(178,91,58,.10); color:var(--warn); }
  .foot{ margin-top:24px; font-size:12px; color:var(--ink-soft); border-top:1px solid var(--line); padding-top:14px; }
  /* 홈: 카테고리 카드 격자 */
  .home-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-top:24px; }
  .cat-card{ background:var(--card); border:1px solid var(--line); border-radius:6px; padding:18px 16px 16px; cursor:pointer; text-align:left; font:inherit; color:inherit; display:flex; flex-direction:column; gap:8px; min-height:118px; }
  .cat-card:hover{ border-color:var(--accent); }
  .cat-card .ci{ font-size:28px; line-height:1; }
  .cat-card .cn{ font-family:var(--serif); font-size:18px; font-weight:700; }
  .cat-card .cc{ font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin-top:auto; }
  .cat-card .cv{ font-family:var(--mono); font-size:9.5px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.14em; }
  .home-empty{ text-align:center; padding:64px 20px 40px; }
  .home-empty .em{ font-size:40px; }
  .home-empty h2{ font-family:var(--serif); font-size:21px; color:var(--ink); margin:14px 0 8px; font-weight:700; }
  .home-empty p{ font-size:13.5px; color:var(--ink-soft); margin:0 0 22px; }
  /* 차량 등 선택기 칩 */
  .picker{ display:flex; gap:6px; flex-wrap:wrap; margin:2px 0 6px; }
  .chip{ font-family:var(--mono); font-size:12px; padding:5px 12px; border-radius:14px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer; }
  .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  /* 설정: 카테고리 관리 */
  .set h4{ font-family:var(--serif); font-size:15px; margin:20px 0 6px; padding-top:14px; border-top:1px solid var(--line-soft); }
  .set h4:first-of-type{ border-top:none; padding-top:0; margin-top:4px; }
  .cat-mrow{ display:flex; align-items:center; gap:12px; padding:11px 2px; border-bottom:1px solid var(--line-soft); }
  .cat-mrow .mi{ font-size:20px; width:26px; text-align:center; }
  .cat-mrow .mn{ flex:1; font-size:14.5px; }
  .cat-mrow .mv{ font-family:var(--mono); font-size:9.5px; color:var(--ink-soft); }
  .sw{ width:44px; height:25px; border-radius:13px; border:1px solid var(--line); background:var(--paper); position:relative; cursor:pointer; transition:.15s; flex:none; }
  .sw::after{ content:""; position:absolute; top:2px; left:2px; width:19px; height:19px; border-radius:50%; background:#fff; border:1px solid var(--line); transition:.15s; }
  .sw.on{ background:var(--accent); border-color:var(--accent); }
  .sw.on::after{ left:21px; border-color:var(--accent); }
  @media (max-width:520px){ .card{ grid-template-columns:auto 1fr; } .flags{ grid-column:2; flex-direction:row; margin-top:6px; } }
  @media (prefers-reduced-motion:no-preference){ .card{ transition:border-color .15s ease; } }
</style>

<script>
/* =====================================================================
 *  내도감 엔진 골조 v1
 *  구조: [MANIFESTS 설정] → [DataSource 추상화] → [Engine 렌더]
 *  - 데모(Mock)로 즉시 구동. Client ID 입력 시 GoogleSheet로 무중단 교체.
 *  - 화면/엔진은 데이터 출처를 모른다(영속성·배포·테스트를 동시에 해결).
 *  실행: 브라우저로 열면 데모로 동작. 구글 연결은 http 서버(localhost)에서만 가능.
 * ===================================================================== */

/* ── 0. 안전 저장소: 배포본은 localStorage, 미리보기/샌드박스는 메모리로 자동 폴백 ── */
const store = (() => {
  try { const k="__nd"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return localStorage; }
  catch(e){ const m={}; return { getItem:k=>k in m?m[k]:null, setItem:(k,v)=>{m[k]=String(v);}, removeItem:k=>{delete m[k];} }; }
})();

/* ── 1. MANIFESTS: 도메인 정의(여기만 늘리면 도메인이 는다) ── */
const MANIFESTS = {
  /* 영화: 실제 구글시트(Apps Script)에서 라이브로 불러옴.
     source.map = 시트 한글 헤더 → 엔진 항목 이름.  source.derive = 특수 처리(코드·수식·숫자). */
  movies:{ id:"movies", title:"영화", icon:"🎬", vol:"卷1",
    source:{ type:"appsscript", sheet:"",   // 영화는 기본 시트(파라미터 없음)
      map:{ director:"감독", actors:"배우", country:"국적", recommend:"추천", review:"리뷰" },
      derive(o, row, re){
        o.title  = re(row['한국 개봉명']) || re(row['원제']);   // 한국명 우선, 없으면 원제
        o.orig   = re(row['원제']);
        o.year   = parseInt(re(row['개봉연도']),10) || null;   // "2007.0" → 2007
        o.rating = parseFloat(re(row['TMDB평점'])) || null;
        o.streaming = re(row['스트리밍']).split(/[,\/]+/).map(s=>s.trim()).filter(Boolean);
        const code = re(row['시청여부']);                       // 두 글자 코드 해석
        o.watched = code.charAt(0)==='W' ? "O" : "";           // W_ = 시청완료
        o.rewatch = code.charAt(1)==='R';                       // _R = 다시볼것
        o.pick    = code.charAt(1)==='P';                       // _P = 찜
        o._id = (o.orig||o.title||'') + '_' + (o.year||'');
      } },
    search:["title","orig","director","actors"],
    stats:[ {label:"전체",type:"count"},
            {label:"시청완료",type:"countIf",field:"watched",eq:"O"},
            {label:"다시볼것",type:"countIf",field:"rewatch",eq:true},
            {label:"찜",type:"countIf",field:"pick",eq:true} ],
    card:{ kind:"specimen", thumb:"🎞",
           meta:r=>[r.year, r.director, r.actors].filter(Boolean).join(" · "),
           tags:"streaming",
           flags:r=>[ r.rating!=null?{t:"★ "+r.rating,cls:"star"}:0,
                      r.watched==="O"?{t:"시청",cls:"on"}:0,
                      r.rewatch?{t:"다시볼것",cls:"on"}:0,
                      r.pick?{t:"찜",cls:"on"}:0 ] } },

  /* 차계부: 백엔드는 이미 있지만 이번 단계는 데모(샘플) 유지.
     실제 연결은 movies처럼 source.type:"appsscript", sheet:"carlog" + map/derive 한 벌만 추가하면 됨. */
  /* 차계부: 실제 구글시트(정비·지출 기록)에서 라이브로 불러옴. */
  carlog:{ id:"carlog", title:"차계부", icon:"🚗", vol:"卷2",
    source:{ type:"appsscript", sheet:"carlog",
      derive(o,row,re){
        o.date = re(row['날짜']);
        o.car  = re(row['차량']);
        o.work = re(row['작업내용']);
        o.shop = re(row['정비소']);
        o.memo = re(row['비고']);
        o.cost = parseInt(String(re(row['가격'])).replace(/[^\d]/g,''),10) || 0;   // 비숫자는 0
        o.odo  = parseInt(String(re(row['주행거리'])).replace(/[^\d]/g,''),10) || null;
        o._id  = re(row['ID']) || crypto.randomUUID();
      } },
    filterBy:{ field:"car", allLabel:"전체" },
    search:["work","shop","car","memo"],
    stats:[ {label:"총 지출",type:"sum",field:"cost",unit:"원"},
            {label:"기록 수",type:"count"} ],
    card:{ kind:"data", title:r=>`${r.date}${r.car?" · "+r.car:""}`,
           kv:[{k:"작업",f:"work"},{k:"금액",f:"cost",u:"원"},{k:"주행",f:"odo",u:"km"},{k:"정비소",f:"shop"}] } },

  /* 도서: '설정 한 장'으로 추가된 새 분야. 지금은 샘플로 화면 확인.
     실제 시트 연결 준비되면 → source 를 { type:"appsscript", sheet:"book", map:{...}, derive(){...} } 로 교체만. */
  books:{ id:"books", title:"도서", icon:"📖", vol:"卷3", canAdd:true,
    source:{ type:"sheet", tab:"도서" },
    search:["title","author"],
    stats:[ {label:"전체",type:"count"},
            {label:"읽음",type:"countIf",field:"status",eq:"읽음"},
            {label:"읽는중",type:"countIf",field:"status",eq:"읽는중"},
            {label:"찜",type:"countIf",field:"pick",eq:true} ],
    card:{ kind:"specimen", thumb:"📖",
           meta:r=>[r.year, r.author, r.genre].filter(Boolean).join(" · "),
           tags:"tags",
           flags:r=>[ r.rating!=null?{t:"★ "+r.rating,cls:"star"}:0,
                      r.status==="읽음"?{t:"읽음",cls:"on"}:0,
                      r.status==="읽는중"?{t:"읽는중",cls:"on"}:0,
                      r.pick?{t:"찜",cls:"on"}:0 ] } },

  /* 100대 명산: 오른 곳을 체크하는 목록. */
  mountains:{ id:"mountains", title:"100대 명산", icon:"⛰", vol:"卷4",
    source:{ type:"sheet", tab:"명산" },
    search:["title","region"],
    stats:[ {label:"전체",type:"count"},
            {label:"오른 곳",type:"countIf",field:"climbed",eq:true} ],
    card:{ kind:"specimen", thumb:"⛰",
           meta:r=>[r.height?r.height+"m":"", r.region].filter(Boolean).join(" · "),
           tags:"tags",
           flags:r=>[ r.climbed?{t:"완등",cls:"on"}:0 ] } },

  /* 러닝: 날짜·거리·시간 기록, 페이스는 자동 계산. */
  running:{ id:"running", title:"러닝", icon:"🏃", vol:"卷5",
    source:{ type:"sheet", tab:"러닝" },
    search:["memo"],
    computed:{ pace:{ deps:["dist","time"], calc:"pacePerKm" } },
    stats:[ {label:"총 거리",type:"sum",field:"dist",unit:"km"},
            {label:"평균 페이스",type:"avgComputed",field:"pace",unit:"분/km"},
            {label:"기록 수",type:"count"} ],
    card:{ kind:"data", title:r=>`${r.date}`,
           kv:[{k:"거리",f:"dist",u:"km"},{k:"시간",f:"time",u:"분"},{k:"페이스",f:"pace",u:"분/km"}] } }
};

/* ── 2. DataSource 추상화 ──
   계약: ensureReady(), list(domainId)→rows[], upsert(domainId,row), label, isLive */
class MockDataSource {
  constructor(){ this.isLive=false; this.label="데모 데이터"; this._d=SAMPLE; }
  async ensureReady(){ return true; }
  async list(id){ return (this._d[id]||[]).slice(); }
  async upsert(id,row){ const a=this._d[id]||(this._d[id]=[]); const i=a.findIndex(x=>x._id===row._id);
    i>=0?a[i]=row:a.push({...row,_id:row._id||crypto.randomUUID()}); return true; }
}
/* 구글 시트 소스: drive.file 스코프로 앱 전용 시트에 read/write. Client ID 필요. */
/* 내 구글시트: 로그인 후 내 드라이브에 '내도감 Data'를 만들고 읽고/쓴다.
   ★ 안전 규칙: 탭이 '없을 때만' 만든다. 있으면 절대 손대지 않는다. 지우거나 덮어쓰는 기능은 아예 없다. */
class GoogleSheetDataSource {
  constructor(clientId){ this.clientId=clientId; this.isLive=true; this.label="내 구글시트"; this.token=null; this.ssId=store.getItem("nd.ssId"); }
  async ensureReady(){ await this._auth(); await this._ensureSpreadsheet(); await this._ensureTabs(); return true; }
  _auth(){ return new Promise((res,rej)=>{
    if(!window.google?.accounts?.oauth2) return rej(new Error("구글 로그인 스크립트 미로드(인터넷 확인)"));
    const tc = google.accounts.oauth2.initTokenClient({
      client_id:this.clientId, scope:"https://www.googleapis.com/auth/drive.file",
      callback:r=>{ if(r.error) return rej(new Error("로그인 실패: "+r.error)); this.token=r.access_token; res(); } });
    tc.requestAccessToken();
  }); }
  async _api(url,opt={}){
    const res=await fetch(url,{...opt,headers:{Authorization:"Bearer "+this.token,"Content-Type":"application/json",...(opt.headers||{})}});
    const t=await res.text(); let b; try{b=JSON.parse(t);}catch{b=t;}
    if(!res.ok){ let h=res.status===403?" (구글 클라우드에서 Sheets·Drive 사용설정 확인)":res.status===401?" (다시 연결 필요)":"";
      const msg=(b&&b.error&&b.error.message) ? b.error.message : (typeof b==="string"?b.slice(0,200):JSON.stringify(b).slice(0,200));
      throw new Error(`HTTP ${res.status}${h} — ${msg}`); }
    return b;
  }
  _cell(v){ return Array.isArray(v)?v.join("|") : v===true?"TRUE" : v===false?"FALSE" : (v==null?"":String(v)); }
  _range(sheet, a1){ return encodeURIComponent(`'${sheet}'!${a1}`); }   // 한글 탭 이름은 따옴표로 감싼다
  async _ensureSpreadsheet(){   // 파일이 없을 때만, 저장용 탭(도서·명산·러닝)만 딱 만든다(빈 기본시트 안 생기게)
    if(this.ssId) return;
    const tabs=Object.values(MANIFESTS).filter(m=>m.source?.type==="mysheet").map(m=>({properties:{title:m.source.sheet}}));
    const d=await this._api("https://sheets.googleapis.com/v4/spreadsheets",{method:"POST",
      body:JSON.stringify({properties:{title:"내도감 Data"}, sheets:tabs})});
    this.ssId=d.spreadsheetId; store.setItem("nd.ssId",this.ssId);
  }
  async _tabTitles(){
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}?fields=sheets.properties.title`);
    return (d.sheets||[]).map(s=>s.properties.title);
  }
  async _isEmpty(sheet){   // 탭이 비어 있는지(헤더도 없는지) 확인
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(sheet,"A1")}`);
    return !(d.values && d.values.length);
  }
  async _ensureTabs(){   // 없는 탭만 만들고, '비어 있을 때만' 헤더·샘플을 채운다. 기존 데이터는 절대 안 덮음.
    const have=await this._tabTitles();
    this.warnings=[];
    for(const m of Object.values(MANIFESTS)){
      if(m.source?.type!=="mysheet") continue;
      const tab=m.source.sheet;                                      // ★ 탭 이름은 설정(source) 안에 있다
      try{
        if(!have.includes(tab)){                                     // 없으면 탭 생성
          await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}:batchUpdate`,{method:"POST",
            body:JSON.stringify({requests:[{addSheet:{properties:{title:tab}}}]})});
        }
        if(await this._isEmpty(tab)){                                // ★ 비어 있을 때만 채움(부분실패 복구 포함)
          const keys=["_id",...fieldKeys(m)];
          const seed=(SAMPLE[m.id]||[]).map(r=>keys.map(k=>this._cell(r[k])));
          await this._write(tab, [keys, ...seed]);
        }
      }catch(e){ this.warnings.push(`${m.title}: ${e.message}`); }   // 한 탭이 실패해도 연결은 계속
    }
  }
  async _write(sheet,values){
    return this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(sheet,"A1")}?valueInputOption=RAW`,
      {method:"PUT",body:JSON.stringify({values})});
  }
  async list(id){
    const m=MANIFESTS[id];
    const d=await this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(m.source.sheet,"A1:Z10000")}`);
    const vals=d.values||[]; if(vals.length<2) return [];
    const [head,...rows]=vals;
    return rows.map(r=>Object.fromEntries(head.map((k,i)=>[k, coerce(r[i])])));
  }
  async upsert(id,row){   // 맨 아래에 한 줄만 추가(append). 기존 줄은 절대 안 건드림.
    const m=MANIFESTS[id]; const keys=["_id",...fieldKeys(m)];
    const line=keys.map(k=>this._cell(row[k]));
    return this._api(`https://sheets.googleapis.com/v4/spreadsheets/${this.ssId}/values/${this._range(m.source.sheet,"A1")}:append?valueInputOption=RAW`,
      {method:"POST",body:JSON.stringify({values:[line]})});
  }
}
/* Apps Script 통로: 기존 백엔드(doGet)를 그대로 재사용. 이번 단계는 읽기(list) 전용. */
function reCell(s){ // 네이버 링크 수식이 껴 있으면 글자만 뽑고, 아니면 그대로 정리
  return String(s==null?'':s).replace(/=HYPERLINK\("[^"]*",\s*"([^"]+)"\)/,'$1').trim();
}
function mapRow(m, row){ // 시트 한 줄(한글 헤더) → 엔진 항목
  const out = {};
  const map = m.source?.map || {};
  for(const [key, header] of Object.entries(map)) out[key] = reCell(row[header]);
  if(typeof m.source?.derive === "function") m.source.derive(out, row, reCell);
  if(!out._id) out._id = crypto.randomUUID();
  return out;
}
class AppsScriptDataSource {
  constructor(url){ this.url=url; this.isLive=true; this.label="구글시트"; }
  async ensureReady(){ if(!this.url) throw new Error("APPS_SCRIPT_URL이 비어 있습니다"); return true; }
  async list(id){
    const m=MANIFESTS[id];
    const q=m.source?.sheet ? ("?sheet="+encodeURIComponent(m.source.sheet)) : "";
    const res=await fetch(this.url+q);
    if(!res.ok) throw new Error("HTTP "+res.status+" (Apps Script 배포/권한 확인)");
    const raw=await res.json();
    return (Array.isArray(raw)?raw:[]).map(row=>mapRow(m,row));
  }
  async upsert(){ throw new Error("이 단계는 보기 전용입니다(추가·수정은 다음 단계)"); }
}

/* SheetDataSource: 기존 시트에 '탭'을 만들고 읽고 쓰는 통로 (방금 뚫은 nd 문 사용).
   도서·명산·러닝처럼 우리가 관리하는 탭에 씀. 영화·차계부는 위 AppsScriptDataSource(기존 방식) 유지. */
function sheetCell(v){ return Array.isArray(v)?v.join("|") : v===true?"TRUE" : v===false?"FALSE" : (v==null?"":String(v)); }
class SheetDataSource {
  constructor(url){ this.url=url; this.isLive=true; this.label="구글시트"; this._ensured=new Set(); }
  async ensureReady(){ if(!this.url) throw new Error("APPS_SCRIPT_URL이 비어 있습니다"); return true; }
  _flatten(m, r){ const header=["_id",...fieldKeys(m)]; const o={}; header.forEach(h=>o[h]=sheetCell(r[h])); return o; }
  async _post(payload){   // 탭 만들기·한 줄 추가 같은 '쓰기'. text/plain로 보내야 브라우저가 안 막음.
    const res=await fetch(this.url,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(Object.assign({nd:1},payload))});
    const t=await res.text(); let j; try{ j=JSON.parse(t); }catch(e){ j={}; }
    if(j && j.error) throw new Error(j.error);
    return j;
  }
  async ensure(m){        // 탭이 없으면 만들고(+샘플), 있으면 그대로. 한 세션에 한 번만.
    if(this._ensured.has(m.id)) return;
    const header=["_id",...fieldKeys(m)];
    const rows=(SAMPLE[m.id]||[]).map(r=>this._flatten(m,r));
    await this._post({action:"ensureTab", tab:m.source.tab, header, rows});
    this._ensured.add(m.id);
  }
  async list(id){
    const m=MANIFESTS[id];
    await this.ensure(m);
    const res=await fetch(this.url+"?nd=1&action=read&tab="+encodeURIComponent(m.source.tab));
    if(!res.ok) throw new Error("HTTP "+res.status);
    const raw=await res.json();
    if(raw && raw.error) throw new Error(raw.error);
    return (Array.isArray(raw)?raw:[]).map(row=>{ const o={}; for(const k in row) o[k]=coerce(row[k]); return o; });
  }
  async upsert(id,row){   // 탭 맨 아래에 한 줄 추가(저장)
    const m=MANIFESTS[id];
    return this._post({action:"append", tab:m.source.tab, header:["_id",...fieldKeys(m)], row:this._flatten(m,row)});
  }
}
const fieldKeys = m => (SAMPLE[m.id]?.[0] ? Object.keys(SAMPLE[m.id][0]).filter(k=>k!=="_id") : m.search);
const coerce = v => v==="TRUE"?true : v==="FALSE"?false : (v!=="" && !isNaN(v) && v!==null)? +v : (typeof v==="string"&&v.includes("|")?v.split("|"):v);

/* ── 3. Engine: computed·통계·검색·렌더(데이터 출처 무관) ── */
const CALCS = { // 확장점: 새 계산식은 여기 등록
  deltaOdoPerLiter(rows, field){ let prev=null; return rows.map(r=>{ let v=null;
    if(r.type==="주유"&&r.liters){ if(prev!=null) v=+((r.odo-prev)/r.liters).toFixed(1); prev=r.odo; }
    return {...r,[field]:v}; }); },
  pacePerKm(rows, field){ return rows.map(r=>({ ...r, [field]: (r.dist? +(r.time/r.dist).toFixed(1): null) })); }
};
function applyComputed(m, rows){
  if(!m.computed) return rows;
  let out=rows;
  for(const [field,spec] of Object.entries(m.computed)){
    const fn=CALCS[spec.calc]; if(fn) out=fn(out, field);
  }
  return out;
}
function calcStat(s, rows){
  try{
    if(s.type==="count") return rows.length;
    if(s.type==="countIf") return rows.filter(r=>r[s.field]===s.eq).length;
    if(s.type==="sum") return rows.filter(r=>!s.where||Object.entries(s.where).every(([k,v])=>r[k]===v)).reduce((a,r)=>a+(+r[s.field]||0),0);
    if(s.type==="avgComputed"){ const v=rows.map(r=>r[s.field]).filter(x=>x!=null); return v.length?+(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):0; }
  }catch(e){ console.error("stat",e); return "—"; } return "—";
}
const fmt = n => typeof n==="number"?n.toLocaleString("ko-KR"):n;
function filterRows(m, rows, q){ q=(q||"").trim().toLowerCase(); if(!q) return rows;
  return rows.filter(r=>m.search.some(f=>String(r[f]??"").toLowerCase().includes(q))); }

/* ── 4. State + App ── */
const state = { view:"home", domain:null, query:"", pick:"", rows:[] };
const src = { current:null };
const $ = s=>document.querySelector(s);
let _mock=null, _apps=null, _sheet=null;
function sheetSrc(){ return _sheet||(_sheet=new SheetDataSource(CONFIG.APPS_SCRIPT_URL)); }
/* 설정에서 카테고리를 켜면, 그 분야가 기존 시트에 탭으로 생기게 한다(없을 때만 생성). */
async function ensureCategoryTab(id){ const m=MANIFESTS[id]; if(m.source?.type!=="sheet") return;
  try{ await sheetSrc().ensure(m); }catch(e){ /* 실패해도 나중에 열 때 다시 시도 */ } }

/* 켜둔 카테고리 목록(브라우저에 기억). 처음엔 빈 상태 → 설정에서 추가. */
function getActive(){ try{ return JSON.parse(store.getItem("nd.active")||"[]"); }catch(e){ return []; } }
function setActive(list){ store.setItem("nd.active", JSON.stringify(list)); }
function isActive(id){ return getActive().includes(id); }
function toggleActive(id,on){ let a=getActive(); if(on){ if(!a.includes(id)) a.push(id); } else a=a.filter(x=>x!==id); setActive(a); }

/* 화면 전환: home(카드 격자) ↔ domain(분야 목록) */
function showView(v){ state.view=v;
  $("#home").style.display = v==="home"?"block":"none";
  $("#domainView").style.display = v==="domain"?"block":"none"; }
function goHome(){ state.domain=null; state.query=""; state.pick=""; showView("home"); renderHome(); }
function openDomain(id){ state.domain=id; state.query=""; state.pick=""; $("#search").value=""; showView("domain"); loadAndRender(); }

/* 홈: 켜둔 카테고리를 카드로. 건수는 한 번 열어본 분야만 표시(홈을 빠르게 유지). */
function renderHome(){
  const active = getActive().map(id=>MANIFESTS[id]).filter(Boolean);
  const home=$("#home");
  if(!active.length){
    home.innerHTML=`<div class="home-empty"><div class="em">🗂</div>
      <h2>아직 담은 카테고리가 없어요</h2>
      <p>설정에서 원하는 카테고리를 켜면<br>여기 카드로 올라옵니다.</p>
      <button class="btn" id="emptyAdd">카테고리 추가하기</button></div>`;
    $("#emptyAdd").onclick=openSettings; return;
  }
  home.innerHTML=`<div class="home-grid">`+active.map(m=>{
    const cnt = CACHE[m.id] ? `${fmt(CACHE[m.id].length)}건` : "";
    return `<button class="cat-card" data-id="${m.id}"><span class="cv">${m.vol}</span>
      <span class="ci">${m.icon}</span><span class="cn">${m.title}</span><span class="cc">${cnt}</span></button>`;
  }).join("")+`</div>`;
  home.querySelectorAll(".cat-card").forEach(b=>b.onclick=()=>openDomain(b.dataset.id));
}
/* 분야가 선언한 source.type 에 따라 출처를 고른다.
   appsscript → 영화·차계부(기존 방식) / sheet → 도서·명산·러닝(기존 시트에 탭으로) */
function sourceFor(m){
  if(m.source?.type==="appsscript" && CONFIG.APPS_SCRIPT_URL) return _apps||(_apps=new AppsScriptDataSource(CONFIG.APPS_SCRIPT_URL));
  if(m.source?.type==="sheet" && CONFIG.APPS_SCRIPT_URL) return sheetSrc();
  return _mock||(_mock=new MockDataSource());
}
/* (참고) 구글 로그인 방식(GoogleSheetDataSource)은 '배포 단계'용으로 코드만 남겨둠 — 지금은 미사용. */

/* 탭: 홈에서 켜둔 카테고리만 표시(안 켠 건 안 나옴 → 길어지지 않음) */
function renderTabs(){ $("#tabs").innerHTML=getActive().map(id=>{ const m=MANIFESTS[id]; if(!m) return "";
  return `<button class="tab" role="tab" data-id="${id}" aria-selected="${id===state.domain}"><span>${m.icon}</span> ${m.title}</button>`; }).join(""); }
function renderStats(m, rows){ $("#stats").innerHTML=m.stats.map(s=>{ let n=calcStat(s,rows);
  if(s.type==="sum"||s.type==="avgComputed") n=fmt(n)+(s.unit?` ${s.unit}`:""); return `<div class="stat"><div class="n">${n}</div><div class="l">${s.label}</div></div>`; }).join(""); }
function renderSearch(m){ const L={title:"제목",director:"감독",actors:"배우",type:"구분",memo:"메모",work:"작업",shop:"정비소",car:"차량",region:"지역",author:"저자"};
  $("#search").placeholder="🔍 "+m.search.map(f=>L[f]||f).join(" · ")+" 검색…"; }
/* 선택기(예: 차량 전체|싼타페|제네시스): 데이터에서 값 자동 추출, 2개 이상일 때만 표시 */
function renderPicker(m){
  const p=$("#picker");
  if(!m.filterBy){ p.style.display="none"; p.innerHTML=""; return; }
  const vals=[...new Set(state.rows.map(r=>String(r[m.filterBy.field]||"").trim()).filter(Boolean))];
  if(vals.length<2){ p.style.display="none"; p.innerHTML=""; state.pick=""; return; }  // 1개뿐이면 숨김
  p.style.display="flex";
  const opts=[{v:"",label:m.filterBy.allLabel||"전체"}, ...vals.map(v=>({v,label:v}))];
  p.innerHTML=opts.map(o=>`<button class="chip ${o.v===state.pick?'on':''}" data-v="${o.v}">${o.label}</button>`).join("");
  p.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{ state.pick=b.dataset.v; loadAndRender(); });
}
function renderCard(m, r, no){ const c=m.card;
  if(c.kind==="specimen"){ const meta=c.meta(r); const tags=(r[c.tags]||[]).map(t=>`<span class="tag">${t}</span>`).join("");
    const flags=(typeof c.flags==="function"?c.flags(r):[]).filter(Boolean)
      .map(f=>`<span class="flag ${f.cls||""}">${f.t}</span>`).join("");
    return `<button class="card" data-id="${r._id}"><span class="cat-no">#${String(no).padStart(3,"0")}</span><span class="thumb">${r.cover?`<img src="${r.cover}" alt="">`:c.thumb}</span>
      <span class="body"><h3>${r.title}</h3><div class="meta">${meta}</div><div class="tags">${tags}</div></span><span class="flags">${flags}</span></button>`; }
  const kv=c.kv.map(col=>{ const v=r[col.f]; if(v==null) return ""; const s=(typeof v==="number"?fmt(v):v)+(col.u?` ${col.u}`:"");
    return `<span>${col.k} <b>${s}</b></span>`; }).filter(Boolean).join("");
  return `<button class="card" data-id="${r._id}" style="grid-template-columns:auto 1fr;"><span class="thumb">🧾</span>
    <span class="body"><h3 style="font-size:15px">${c.title(r)}</h3><div class="kv">${kv}</div>${r.memo?`<div class="meta" style="margin-top:5px">${r.memo}</div>`:""}</span></button>`; }
function openDetail(m, r){ const rows=Object.entries(r).filter(([k])=>k!=="_id").map(([k,v])=>
    `<div class="drow"><span class="k">${k}</span><span>${Array.isArray(v)?v.join(", "):v===null?"—":v===true?"예":v===false?"아니오":v}</span></div>`).join("");
  const d=$("#detail"); d.innerHTML=`<div class="dhead"><h3>${m.card.kind==="specimen"?r.title:r.date+" · "+r.type}</h3></div><div class="dbody">${rows}</div>
    <button class="dclose" onclick="this.closest('dialog').close()">닫기</button>`; d.showModal(); }

const CACHE = {};   // 분야별로 한 번 불러온 데이터를 기억 → 탭 전환·검색 때 다시 안 받음
async function loadAndRender(){
  const m=MANIFESTS[state.domain]; $("#root").dataset.domain=state.domain;
  src.current = sourceFor(m);
  const chip=$("#srcChip"); chip.textContent=src.current.label; chip.classList.toggle("live", !!src.current.isLive);
  renderTabs(); renderSearch(m);
  const addBtn=$("#addBtn");
  if(m.canAdd){ addBtn.style.display="inline-block"; addBtn.textContent="+ "+m.title+" 추가"; }
  else addBtn.style.display="none";
  $("#banner").innerHTML="";
  if(!CACHE[state.domain]){                       // 처음 여는 분야만 실제로 불러온다
    $("#count").textContent="불러오는 중…";
    try{ CACHE[state.domain] = await src.current.list(state.domain); }
    catch(e){ $("#banner").innerHTML=`<div class="banner warn">데이터를 불러오지 못했습니다: ${e.message}</div>`; CACHE[state.domain]=[]; }
  }
  const raw = CACHE[state.domain];
  state.rows = applyComputed(m, raw.map(r=>({_id:r._id||crypto.randomUUID(),...r})));
  renderPicker(m);
  let base = state.rows;
  if(m.filterBy && state.pick) base = base.filter(r=>String(r[m.filterBy.field]||"").trim()===state.pick);
  renderStats(m, base);
  const rows=filterRows(m, base, state.query);
  $("#count").textContent=`총 ${rows.length}건 · 출처: ${src.current.label}`;
  $("#list").innerHTML=rows.map((r,i)=>renderCard(m,r,i+1)).join("") || `<div class="count">결과가 없습니다.</div>`;
  document.querySelectorAll(".card").forEach(b=>b.onclick=()=>openDetail(m, state.rows.find(x=>x._id===b.dataset.id)));
}

/* ── 5. 설정: 카테고리 켜고 끄기 + 구글/개인 설정 자리 ── */
function openSettings(){
  const d=$("#settings");
  const rows=Object.values(MANIFESTS).map(m=>`<div class="cat-mrow">
     <span class="mi">${m.icon}</span>
     <span class="mn">${m.title} <span class="mv">${m.vol}</span></span>
     <button class="sw ${isActive(m.id)?'on':''}" data-id="${m.id}" role="switch" aria-checked="${isActive(m.id)}" type="button"></button>
   </div>`).join("");
  d.innerHTML=`<div class="dhead"><h3>설정</h3></div><div class="dbody set">
    <h4>카테고리 관리</h4>
    <div class="hint">켜면 홈에 카드가 생기고(그 분야 탭도 시트에 자동 생성), 끄면 홈에서 사라집니다. (시트의 데이터는 지워지지 않아요)</div>
    ${rows}
    <h4>구글 계정 · 개인 설정</h4>
    <div class="hint">모든 데이터는 내 구글시트 하나에 탭으로 모입니다. 남에게 배포할 때 쓰는 '구글 로그인'은 다음 단계에서 붙입니다.</div>
    <button class="btn ghost" id="closeSet" style="margin-top:22px">닫기</button>
  </div>`;
  d.showModal();
  d.querySelectorAll(".sw").forEach(sw=>sw.onclick=()=>{
    const id=sw.dataset.id, on=!sw.classList.contains("on");
    sw.classList.toggle("on",on); sw.setAttribute("aria-checked",on);
    toggleActive(id,on);
    if(on) ensureCategoryTab(id);          // 켜면 시트에 그 탭 생성(없을 때만)
    if(state.view==="home") renderHome();
  });
  $("#closeSet").onclick=()=>d.close();
}

/* ── 6. 부트: 저장된 Client ID 있으면 구글, 없으면 데모 ── */
/* ── 책 추가: 구글 북스에서 제목 검색 → 저자·연도·표지 자동 채움 → 목록에 추가 ── */
async function searchBooks(q){
  if(!q || !q.trim()) return [];
  var key = CONFIG.GOOGLE_BOOKS_KEY ? ("&key="+CONFIG.GOOGLE_BOOKS_KEY) : "";
  const url="https://www.googleapis.com/books/v1/volumes?maxResults=6&country=KR&q="+encodeURIComponent(q.trim())+key;
  let res=await fetch(url);
  if(res.status===429){                       // 너무 자주 불러 잠깐 막힘 → 1.2초 쉬고 한 번 더
    await new Promise(r=>setTimeout(r,1200));
    res=await fetch(url);
  }
  if(res.status===429) throw new Error("검색이 잠깐 제한됐어요. 몇 초 뒤 다시 해보거나, 설정 안내대로 '책 검색 키'를 넣으면 해결됩니다.");
  if(!res.ok) throw new Error("HTTP "+res.status);
  const d=await res.json();
  return (d.items||[]).map(it=>{ const v=it.volumeInfo||{};
    return { title:v.title||"", author:(v.authors||[]).join(", "),
      year:parseInt(String(v.publishedDate||"").slice(0,4),10)||null,
      cover:String(v.imageLinks&&v.imageLinks.thumbnail||"").replace(/^http:/,"https:"),
      genre:(v.categories||[]) }; });
}
let addStatus="읽고싶다";
function openAddBook(){
  const d=$("#add"); const statuses=["읽음","읽는중","읽고싶다"];
  d.innerHTML=`<div class="dhead"><h3>책 추가</h3></div><div class="dbody set">
    <label style="margin-top:0">이 책의 상태</label>
    <div style="display:flex;gap:6px">${statuses.map(s=>`<button class="btn ghost st ${s===addStatus?'on':''}" data-s="${s}">${s}</button>`).join("")}</div>
    <label>제목으로 검색</label>
    <input id="bq" placeholder="책 제목 입력…" autocomplete="off" />
    <div id="bres" style="margin-top:12px;display:flex;flex-direction:column;gap:8px;max-height:340px;overflow:auto"></div>
    <button class="btn ghost" id="addClose" style="margin-top:14px">닫기</button></div>`;
  d.showModal();
  d.querySelectorAll(".st").forEach(b=>b.onclick=()=>{ addStatus=b.dataset.s;
    d.querySelectorAll(".st").forEach(x=>x.classList.toggle("on",x.dataset.s===addStatus)); });
  $("#addClose").onclick=()=>d.close();
  const bq=$("#bq"), bres=$("#bres"); let timer=null, results=[];
  bq.addEventListener("input",()=>{ clearTimeout(timer); timer=setTimeout(async()=>{
    if(bq.value.trim().length<2){ bres.innerHTML=""; return; }   // 2글자부터 검색(호출 줄이기)
    bres.innerHTML=`<div class="count">검색 중…</div>`;
    try{ results=await searchBooks(bq.value);
      bres.innerHTML = results.length ? results.map((b,i)=>
        `<button class="card" data-i="${i}" style="grid-template-columns:auto 1fr">
          <span class="thumb">${b.cover?`<img src="${b.cover}" alt="">`:"📖"}</span>
          <span class="body"><h3 style="font-size:15px">${b.title}</h3>
          <div class="meta">${[b.year,b.author].filter(Boolean).join(" · ")}</div></span></button>`).join("")
        : `<div class="count">검색 결과가 없습니다.</div>`;
      bres.querySelectorAll(".card").forEach(btn=>btn.onclick=()=>addBook(results[+btn.dataset.i]));
    }catch(e){ bres.innerHTML=`<div class="banner warn">검색 실패: ${e.message}</div>`; }
  },600); });
  setTimeout(()=>bq.focus(),50);
}
function addBook(b){
  const row={ _id:crypto.randomUUID(), title:b.title, author:b.author, year:b.year,
    cover:b.cover, genre:b.genre||[], rating:null,
    status: addStatus==="읽고싶다" ? "" : addStatus,
    pick: addStatus==="읽고싶다" };
  (CACHE.books || (CACHE.books=[])).push(row);
  $("#add").close();
  loadAndRender();
  sheetSrc().upsert("books", row)          // 시트 '도서' 탭에 실제 저장(영구)
    .catch(e=>alert("시트 저장 실패(화면엔 남아있음): "+e.message));
}

async function boot(){
  // 첫 화면은 홈(켜둔 카테고리 카드 격자). 처음엔 비어 있고, 설정에서 카테고리를 켜면 카드가 생김.
  showView("home"); renderHome();
}
$("#backBtn").addEventListener("click",goHome);
$("#tabs").addEventListener("click",e=>{ const t=e.target.closest(".tab"); if(t) openDomain(t.dataset.id); });

$("#setBtn").addEventListener("click",openSettings);
$("#addBtn").addEventListener("click",()=>{ if(MANIFESTS[state.domain]?.canAdd) openAddBook(); });
